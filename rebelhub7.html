    <style>
        :root { --safe-top: env(safe-area-inset-top); --safe-bottom: env(safe-area-inset-bottom); --rebel-pink: #FF007F; }
        
        body { font-family: 'Lato', sans-serif; transition: background-color 0.3s, color 0.3s; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        .dark { background-color: #050505; color: #d4d4d8; }
        .light { background-color: #f4f4f5; color: #18181b; }

        .rebel-font { font-family: 'Poppins', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .neon-glow { text-shadow: 0 0 12px rgba(255, 0, 127, 0.7); }
        .card-shadow { box-shadow: 0 10px 40px -10px rgba(255, 0, 127, 0.3); }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-slide-up { animation: slideUp 0.5s ease-out forwards; }

        .glass-card { backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); transition: all 0.3s ease; }
        .dark .glass-card { background: rgba(20, 20, 20, 0.7); border-color: rgba(255, 255, 255, 0.05); }
        .light .glass-card { background: rgba(255, 255, 255, 0.8); border-color: rgba(0, 0, 0, 0.1); color: #18181b; }

        .match-day-theme {
            border: 3px solid var(--rebel-pink);
            box-shadow: 0 0 35px rgba(255, 0, 127, 0.5);
            background: linear-gradient(135deg, #050505 0%, #4a0026 100%) !important;
            color: white !important;
            animation: pulse-border 2s infinite;
        }

        @keyframes pulse-border { 0%, 100% { border-color: var(--rebel-pink); } 50% { border-color: #ff5eb3; } }

        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--rebel-pink); }
        input:checked + .slider:before { transform: translateX(20px); }

        #reader { border-radius: 1rem; overflow: hidden; border: 2px solid #FF007F; }
    </style>
</head>
<body class="dark no-scrollbar">

        window.FB = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken, getFirestore, doc, setDoc, updateDoc, onSnapshot, collection, addDoc, deleteDoc, serverTimestamp, query, getDoc };
    </script>

        const SQUAD_DATA = [

            { id: 'p7', name: "Nora", pw: "Rebel12!", icon: "crosshair", number: '12' },
            { id: 'p8', name: "Astrid", pw: "tirnag27!", icon: "users", number: '9' },
            { id: 'p9', name: "Andrea", pw: "Hallo2684", icon: "zap", number: '15' },
            { id: 'p10', name: "Lara", pw: "Weihnachten123!", icon: "sparkles", number: '24' },
            { id: 'p11', name: "Franzi", pw: "8080", icon: "flame", number: '4' },
            { id: 'p12', name: "Carina", pw: "PINK#3", icon: "layers", number: '3' },
            { id: 'p13', name: "Ayleen", pw: "Jackson", icon: "zap", number: '28' },
            { id: 'p14', name: "Sandra", pw: "v3rr@t1cHd1rnIch7", icon: "award", number: '28' },

            { id: 'p16', name: "Nessi", pw: "Blumenwiese2026!", icon: "zap", number: '??' }
        ];

        const FINE_CATALOG = [
            { id: 'f1', label: 'Zu spät (Training)', price: 2 },
            { id: 'f2', label: 'Zu spät (Spiel)', price: 5 },
            { id: 'f3', label: 'Handy in der Kabine', price: 1 },
            { id: 'f4', label: 'Trikot vergessen', price: 3 },
            { id: 'f8', label: 'Hub-Deadline verpasst', price: 0.5 }
        ];

        const SHOP_PRODUCTS = [
            { id: 's1', name: "Rebel Hoodie 'Classic'", price: 45, category: 'fashion', img: 'https://images.unsplash.com/photo-1556821840-3a63f95609a7?auto=format&fit=crop&q=80&w=600', sizes: ['XS', 'S', 'M', 'L', 'XL'] },
            { id: 's2', name: "Game Jersey 'Pink Edition'", price: 35, category: 'fashion', img: 'https://images.unsplash.com/photo-1577212017184-80cc0da11583?auto=format&fit=crop&q=80&w=600', sizes: ['S', 'M', 'L'] },
            { id: 's6', name: "Water Bottle 'Stay Hydrated'", price: 12, category: 'access', img: 'https://images.unsplash.com/photo-1602143407151-01114195bc51?auto=format&fit=crop&q=80&w=600', sizes: ['0.7L'] }
        ];

        const appId = 'hsg-rebelhub';

        // --- ICONS & LOGO ---
        const RebelIcon = ({ name, size = 24, className = "" }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (window.lucide && containerRef.current) {
                    containerRef.current.innerHTML = '';
                    const i = document.createElement('i');
                    const iconName = name ? name.replace(/([a-z])([A-Z])/g, '$1-$2').toLowerCase() : 'zap';
                    i.setAttribute('data-lucide', iconName);
                    i.style.width = `${size}px`; i.style.height = `${size}px`;
                    i.className = className;
                    containerRef.current.appendChild(i);
                    window.lucide.createIcons({ elements: [i] });
                }
            }, [name, size, className]);
            return <span ref={containerRef} style={{ display: 'inline-flex', width: size, height: size }}></span>;
        };

        const RebelLogo = ({ className = "w-12 h-12", status = "connecting", onClick }) => (
            <div className={`relative ${className} cursor-pointer`} onClick={onClick}>
                <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-[0_0_8px_rgba(255,0,127,0.5)]">
                    <path d="M50 5 L90 27.5 L90 72.5 L50 95 L10 72.5 L10 27.5 Z" fill="none" stroke="#FF007F" strokeWidth="6" />
                    <text x="50" y="65" fontFamily="Poppins" fontSize="32" fontWeight="900" fill="#FF007F" textAnchor="middle" fontStyle="italic">UR</text>
                </svg>
                <div className={`absolute -top-1 -right-1 w-3 h-3 rounded-full border-2 border-black ${status === 'connected' ? 'bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.6)]' : 'bg-zinc-500'} transition-colors`}></div>
            </div>
        );

        const NavButton = ({ icon, label, active, onClick, badgeCount }) => (
            <button onClick={onClick} className={`relative flex flex-col items-center gap-1 transition-all min-w-[50px] flex-grow shrink-0 ${active ? 'text-[#FF007F] scale-110 drop-shadow-[0_0_12px_rgba(255,0,127,0.6)]' : 'text-zinc-600 hover:text-zinc-400'}`}>
                <RebelIcon name={icon} size={22} />
                <span className="text-[8px] font-black uppercase tracking-widest mt-1">{label}</span>
                {badgeCount > 0 && (
                    <span className="absolute top-0 right-2 w-4 h-4 bg-red-600 text-white text-[9px] font-black rounded-full flex items-center justify-center border border-black animate-bounce">
                        {badgeCount}
                    </span>
                )}
            </button>
        );

        // --- PUBLIC TICKET SHOP ---
        const PublicTicketShop = ({ db, schedule, ticketPrices, onBack }) => {
            const [buyer, setBuyer] = useState({ name: '', email: '', type: 'day', gameId: '', adults: 1, children: 0 });
            const [ticketId, setTicketId] = useState(null);
            const [loading, setLoading] = useState(false);

            const upcomingGames = useMemo(() => {
                return (schedule || []).filter(e => e.type === 'game' && new Date(e.date) >= new Date().setHours(0,0,0,0));
            }, [schedule]);

            const totalPrice = buyer.type === 'season' ? 40 : (buyer.adults * (ticketPrices?.adults || 5)) + (buyer.children * (ticketPrices?.children || 2));

            const handleBuy = async (e) => {
                e.preventDefault();
                setLoading(true);
                try {
                    const { collection, addDoc, serverTimestamp } = window.FB;
                    const docRef = await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'tickets'), {
                        ...buyer, used: false, paid: false, price: totalPrice, timestamp: serverTimestamp()
                    });
                    setTicketId(docRef.id);
                    if (window.confetti) window.confetti({ particleCount: 100, spread: 70 });
                } catch(err) { alert('Fehler beim Kauf.'); }
                setLoading(false);
            };

            if (ticketId) return (
                <div className="min-h-screen bg-[#050505] p-6 flex flex-col items-center justify-center text-white text-center">
                    <div className="bg-[#111] border border-[#FF007F] p-8 rounded-[2rem] shadow-2xl max-w-sm w-full">
                        <h2 className="rebel-font font-black italic text-2xl mb-4">DEIN REBEL TICKET</h2>
                        <div className="bg-white p-4 rounded-2xl mx-auto w-48 h-48 mb-6">
                            <img src={`https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${ticketId}`} className="w-full h-full" />
                        </div>
                        <p className="font-black text-xl uppercase italic">{buyer.name}</p>
                        <p className="text-zinc-500 text-sm mt-4 uppercase">Ticket ID: {ticketId}</p>
                        <button onClick={onBack} className="mt-8 text-[#FF007F] font-black uppercase text-xs underline">Zurück zum Start</button>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen bg-[#050505] p-6 flex flex-col items-center justify-center text-white">
                    <button onClick={onBack} className="absolute top-6 left-6 text-zinc-500"><RebelIcon name="arrow-left" size={24}/></button>
                    <h1 className="text-2xl font-black italic uppercase mb-8">Fan-Ticket Shop</h1>
                    <form onSubmit={handleBuy} className="w-full max-w-md space-y-4">
                        <input type="text" placeholder="Dein Name" required className="w-full bg-[#111] border border-white/10 rounded-xl p-4" value={buyer.name} onChange={e => setBuyer({...buyer, name: e.target.value})} />
                        <input type="email" placeholder="E-Mail" required className="w-full bg-[#111] border border-white/10 rounded-xl p-4" value={buyer.email} onChange={e => setBuyer({...buyer, email: e.target.value})} />
                        <select className="w-full bg-[#111] border border-white/10 rounded-xl p-4" value={buyer.gameId} onChange={e => setBuyer({...buyer, gameId: e.target.value})} required={buyer.type==='day'}>
                            <option value="">Spiel wählen...</option>
                            {upcomingGames.map(g => <option key={g.id} value={g.id}>{g.label}</option>)}
                        </select>
                        <div className="bg-white/5 p-4 rounded-xl flex justify-between items-center">
                            <span className="font-bold">Summe:</span><span className="text-[#FF007F] font-black text-2xl">{totalPrice} €</span>
                        </div>
                        <button type="submit" disabled={loading} className="w-full bg-[#FF007F] text-white font-black py-4 rounded-xl shadow-lg">TICKET SICHERN</button>
                    </form>
                </div>
            );
        };

        // --- CORE VIEWS ---
        const DashboardView = ({ me, schedule, shoutbox, onPostShout, onDeleteShout, profiles, isAdmin, goals, theme, announcement, votesData, onVote, openVotesCount, setActiveTab, triggerHype }) => {
            const [newShout, setNewShout] = useState('');
            const nextEvent = useMemo(() => {
                const now = new Date();
                return (schedule || []).filter(e => new Date(e.date + 'T' + (e.time||'00:00')) >= now).sort((a,b) => new Date(a.date) - new Date(b.date))[0];
            }, [schedule]);

            return (
                <div className="space-y-8 pb-10">
                    {openVotesCount > 0 && me.id !== 'hc' && me.id !== 'tm' && (
                        <div className="bg-red-500/20 border-2 border-red-500 p-4 rounded-3xl animate-pulse flex items-center justify-between">
                            <div className="flex items-center gap-3"><span className="text-2xl">⚠️</span><div className="text-white"><p className="text-[10px] font-black uppercase tracking-widest leading-none">Abstimmung fehlt!</p><p className="text-sm font-bold mt-1">{openVotesCount} Termine offen.</p></div></div>
                            <button onClick={() => setActiveTab('votes')} className="bg-red-500 text-white px-4 py-2 rounded-xl text-[10px] font-black">PLANER</button>
                        </div>
                    )}
                    
                    {announcement && (<div className="bg-[#FF007F]/10 border-l-4 border-[#FF007F] p-4 rounded-r-2xl text-white flex gap-3"><RebelIcon name="megaphone" size={20}/><p className="text-sm font-bold">{announcement}</p></div>)}

                    {nextEvent && (
                        <div className="bg-[#FF007F]/10 border border-[#FF007F]/30 p-6 rounded-3xl text-center">
                            <h4 className="text-[10px] font-black uppercase text-[#FF007F] mb-2 tracking-widest">Next Event</h4>
                            <p className="font-black italic text-xl text-white">{nextEvent.label}</p>
                            <p className="text-xs text-zinc-500 mt-1 mb-4">{new Date(nextEvent.date).toLocaleDateString()} | {nextEvent.time} Uhr</p>
                            <div className="grid grid-cols-3 gap-2">
                                {['Dabei', 'Nein', 'Maybe'].map(opt => (
                                    <button key={opt} onClick={() => onVote(nextEvent.id, opt)} className={`py-3 rounded-xl text-xs font-black uppercase border transition-all ${votesData[`event_${nextEvent.id}`]?.[me.id] === opt ? 'bg-[#FF007F] text-white' : 'bg-black/50 text-white border-white/10'}`}>{opt}</button>
                                ))}
                            </div>
                        </div>
                    )}

                    <div className="grid grid-cols-2 gap-4">
                        <div className="glass-card p-5 rounded-3xl text-center text-white"><p className="text-[10px] uppercase font-black text-zinc-500 mb-1">Team Tore</p><p className="text-3xl font-black italic text-[#FF007F]">{Object.values(goals).reduce((a, b) => a + b, 0)}</p></div>
                        <div className="glass-card p-5 rounded-3xl text-white"><p className="text-[10px] uppercase font-black text-zinc-500 mb-2">Top Scorers</p>
                            {Object.entries(goals).map(([id, g]) => ({ name: SQUAD_DATA.find(s => s.id === id)?.name || '?', g })).sort((a,b) => b.g - a.g).slice(0,2).map((s,i) => <p key={i} className="text-xs font-black italic">{i+1}. {s.name} ({s.g})</p>)}
                        </div>
                    </div>

                    <section className="space-y-4">
                        <h3 className="rebel-font font-black italic uppercase text-xl text-white">Shoutbox</h3>
                        <div className="bg-[#111] rounded-3xl p-4 border border-white/5 space-y-4">
                            <div className="flex gap-2">
                                <input type="text" placeholder="Hype..." className="flex-grow bg-black rounded-xl p-3 text-sm text-white border border-white/10 outline-none" value={newShout} onChange={e => setNewShout(e.target.value)} />
                                <button onClick={() => { onPostShout(newShout, false); setNewShout(''); }} className="bg-[#FF007F] p-3 rounded-xl text-white"><RebelIcon name="send" size={18}/></button>
                            </div>
                            <div className="max-h-60 overflow-y-auto space-y-3 no-scrollbar">
                                {shoutbox.map(shout => (
                                    <div key={shout.id} className="bg-white/5 p-3 rounded-2xl">
                                        <p className="text-[10px] font-black text-[#FF007F] mb-1 uppercase">{shout.userName}</p>
                                        <p className="text-sm text-white">{shout.text}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>
                </div>
            );
        };

        const LongTermVotes = ({ schedule, votesData, userId, onVote, theme, isAdmin, onAddFine, triggerHype }) => {
            const upcoming = (schedule || []).filter(e => new Date(e.date) >= new Date().setHours(0,0,0,0));
            return (
                <div className="space-y-6 pb-10">
                    <header><h2 className="text-2xl rebel-font font-black italic uppercase text-white">Planer</h2></header>
                    {upcoming.map(event => {
                        const eventVotes = votesData[`event_${event.id}`] || {};
                        const grouped = { 'Dabei': [], 'Nein': [], 'Maybe': [] };
                        Object.entries(eventVotes).forEach(([uid, val]) => { const name = SQUAD_DATA.find(s => s.id === uid)?.name || 'Rebellin'; grouped[val]?.push({ name }); });
                        return (
                            <div key={event.id} className="glass-card p-6 rounded-3xl border border-white/5 space-y-4">
                                <div className="flex justify-between items-start">
                                    <div><h4 className="font-black italic uppercase text-lg text-white leading-none">{event.label}</h4><p className="text-[10px] text-zinc-500 mt-2 font-bold uppercase">{new Date(event.date).toLocaleDateString()} | {event.time} Uhr</p></div>
                                </div>
                                <div className="grid grid-cols-3 gap-2">
                                    {['Dabei', 'Nein', 'Maybe'].map(opt => <button key={opt} onClick={() => onVote(event.id, opt)} className={`py-3 rounded-xl text-xs font-black border transition-all ${eventVotes[userId]===opt?'bg-[#FF007F] text-white border-[#FF007F]':'bg-black/50 border-white/5 text-white'}`}>{opt}</button>)}
                                </div>
                                {isAdmin && (
                                    <AdminReminderTools event={event} votes={eventVotes} squad={SQUAD_DATA} onAddFine={onAddFine} onHype={triggerHype} />
                                )}
                                <div className="pt-4 border-t border-white/5 flex flex-wrap gap-2">
                                    {Object.entries(grouped).map(([label, items]) => items.length > 0 && (
                                        <div key={label} className="w-full">
                                            <p className={`text-[9px] font-black uppercase mb-1 ${label==='Dabei'?'text-green-500':label==='Nein'?'text-red-500':'text-yellow-500'}`}>{label} ({items.length})</p>
                                            <div className="flex flex-wrap gap-1">{items.map((it, idx) => <span key={idx} className="text-[9px] bg-white/5 px-2 py-1 rounded-lg text-zinc-400 font-bold">{it.name}</span>)}</div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        );
                    })}
                </div>
            );
        };

        const SquadView = ({ profiles, goals, mvpWins, health }) => {
            return (
                <div className="grid grid-cols-1 md:grid-cols-2 gap-12 pb-20">
                    {SQUAD_DATA.map(m => {
                        const prof = profiles[m.id] || {};
                        const rating = Math.round(((prof.grip||85)+(prof.vibe||99)+(prof.power||88)+(prof.soul||95))/4);
                        return (
                            <div key={m.id} className="relative h-[400px] w-full max-w-[300px] mx-auto bg-[#050505] rounded-[2rem] border border-[#FF007F]/20 overflow-hidden card-shadow flex flex-col">
                                <div className="p-4 flex justify-between items-start text-white">
                                    <div className="flex flex-col"><span className="text-3xl font-black italic">{rating}</span><span className="text-[7px] text-[#FF007F] font-black">RATING</span></div>
                                    <RebelIcon name={prof.icon || m.icon} size={20} className="text-[#FF007F]" />
                                </div>
                                <div className="mt-auto p-4 bg-black/80 border-t border-white/10 text-center">
                                    <h3 className="text-xl font-black italic uppercase text-white leading-none">{m.name}</h3>
                                    <div className="flex justify-center gap-2 mt-2">
                                        <span className="text-[9px] font-black text-[#FF007F] bg-[#FF007F]/10 px-2 py-0.5 rounded-full">{goals[m.id]||0} Tore</span>
                                        {mvpWins[m.id] > 0 && <span className="text-[9px] font-black text-yellow-500 bg-yellow-500/10 px-2 py-0.5 rounded-full">{mvpWins[m.id]}x MVP</span>}
                                    </div>
                                    <div className="grid grid-cols-2 gap-2 mt-4">
                                        {['Grip', 'Vibe', 'Power', 'Soul'].map(l => (
                                            <div key={l} className="flex flex-col text-left">
                                                <span className="text-[6px] text-zinc-500 uppercase">{l}</span>
                                                <div className="h-0.5 bg-white/10 w-full rounded-full"><div className="h-full bg-[#FF007F]" style={{width: `${prof[l.toLowerCase()]||80}%`}}></div></div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <div className={`absolute top-4 right-4 text-[8px] font-black px-2 py-1 rounded-lg border ${(health[m.id]||'Fit')==='Fit'?'bg-green-500/20 text-green-500 border-green-500':'bg-red-500/20 text-red-500 border-red-500'}`}>{health[m.id]||'Fit'}</div>
                            </div>
                        );
                    })}
                </div>
            );
        };

        const TreasuryView = ({ fines, transactions, isAdmin, onAddTransaction, onDeleteTransaction, myId }) => {
            const totalFines = fines.filter(f => f.paid).reduce((sum, f) => sum + (f.amount || 0), 0);
            const totalIn = transactions.filter(t => t.type === 'income').reduce((sum, t) => sum + (parseFloat(t.amount) || 0), 0) + totalFines;
            const totalOut = transactions.filter(t => t.type === 'expense').reduce((sum, t) => sum + (parseFloat(t.amount) || 0), 0);
            const balance = totalIn - totalOut;

            return (
                <div className="space-y-6 pb-20 text-white">
                    <header><h2 className="text-2xl rebel-font font-black italic uppercase">Rebel Kasse</h2></header>
                    <div className="glass-card p-8 rounded-3xl border-[#FF007F]/30 text-center">
                        <p className="text-[10px] font-black uppercase text-[#FF007F] mb-1 tracking-widest">Kontostand</p>
                        <p className="text-5xl font-black italic">{balance.toFixed(2)} €</p>
                    </div>
                    {isAdmin && (
                        <div className="bg-[#111] p-4 rounded-2xl space-y-3">
                            <input id="t-label" type="text" placeholder="Zweck" className="w-full bg-black border border-white/10 rounded-xl p-3 text-xs" />
                            <input id="t-amount" type="number" placeholder="Betrag €" className="w-full bg-black border border-white/10 rounded-xl p-3 text-xs" />
                            <div className="flex gap-2">
                                <button onClick={() => { 
                                    const l = document.getElementById('t-label').value; 
                                    const a = document.getElementById('t-amount').value;
                                    if(l&&a) onAddTransaction({ label: l, amount: a, type: 'income' });
                                }} className="flex-1 bg-green-500/20 text-green-500 py-3 rounded-xl font-black uppercase text-[10px]">Einnahme</button>
                                <button onClick={() => {
                                    const l = document.getElementById('t-label').value; 
                                    const a = document.getElementById('t-amount').value;
                                    if(l&&a) onAddTransaction({ label: l, amount: a, type: 'expense' });
                                }} className="flex-1 bg-red-500/20 text-red-500 py-3 rounded-xl font-black uppercase text-[10px]">Ausgabe</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const AppWrapper = () => {
            const [user, setUser] = useState(null); 
            const [activeTab, setActiveTab] = useState('dashboard');
            const [loginData, setLoginData] = useState({ id: '', pw: '' });
            const [votesData, setVotesData] = useState({});
            const [shoutbox, setShoutbox] = useState([]);
            const [profiles, setProfiles] = useState({});
            const [schedule, setSchedule] = useState([]);
            const [health, setHealth] = useState({});
            const [fines, setFines] = useState([]);
            const [transactions, setTransactions] = useState([]);
            const [announcement, setAnnouncement] = useState("");
            const [ticketPrices, setTicketPrices] = useState({ adults: 5, children: 2 });
            const [mvpVotes, setMvpVotes] = useState({});
            const [db, setDb] = useState(null);
            const [loading, setLoading] = useState(true);
            const [showPublicShop, setShowPublicShop] = useState(false);

            useEffect(() => {
                const startApp = async () => {
                    let attempts = 0;
                    while (!window.FB && attempts < 20) { await new Promise(r => setTimeout(r, 100)); attempts++; }
                    if (!window.FB) { setLoading(false); return; }
                    try {
                        const { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, getFirestore } = window.FB;
                        const app = initializeApp(firebaseConfig);
                        const auth = getAuth(app);
                        const firestore = getFirestore(app);
                        setDb(firestore);
                        await signInAnonymously(auth);
                        onAuthStateChanged(auth, (u) => {
                            if (u) {
                                const savedId = localStorage.getItem('rebel_hub_user_id');
                                if (savedId) { const found = SQUAD_DATA.find(m => m.id === savedId); if (found) setUser(found); }
                            }
                            setLoading(false);
                        });
                    } catch (e) { setLoading(false); }
                };
                startApp();
            }, []);

            useEffect(() => {
                if (!db || !window.FB) return;
                const { collection, onSnapshot, doc } = window.FB;
                onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'team_votes'), snap => { const d = {}; snap.forEach(doc => d[doc.id] = doc.data()); setVotesData(d); });
                onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'shoutbox'), snap => { const msgs = []; snap.forEach(d => msgs.push({ id: d.id, ...d.data() })); msgs.sort((a,b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0)); setShoutbox(msgs.slice(0, 50)); });
                onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'profiles'), snap => { const d = {}; snap.forEach(doc => d[doc.id] = doc.data()); setProfiles(d); });
                onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'schedule'), snap => { const list = []; snap.forEach(doc => list.push({ id: doc.id, ...doc.data() })); setSchedule(list); });
                onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'health', 'current'), snap => { if(snap.exists()) setHealth(snap.data()); });
                onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'fines'), snap => { const list = []; snap.forEach(d => list.push({ id: d.id, ...d.data() })); setFines(list); });
                onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'treasury'), snap => { const list = []; snap.forEach(d => list.push({ id: d.id, ...d.data() })); setTransactions(list); });
                onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'mvp_votes'), snap => { const d = {}; snap.forEach(doc => d[doc.id] = doc.data()); setMvpVotes(d); });
                onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'globals', 'news'), snap => { if(snap.exists()) setAnnouncement(snap.data().text || ""); });
            }, [db]);

            const handleLogin = (e) => { e.preventDefault(); const found = SQUAD_DATA.find(m => m.id === loginData.id); if (found && found.pw === loginData.pw) { setUser(found); localStorage.setItem('rebel_hub_user_id', found.id); } else { alert('PW falsch.'); } };
            
            const handlePostShout = async (t, a) => {
                const { collection, addDoc, serverTimestamp } = window.FB;
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'shoutbox'), { userId: a ? 'anon' : user.id, userName: a ? '🕵️‍♀️' : user.name, text: t, timestamp: serverTimestamp() });
            };

            const handleAddFine = async (pId, reason, amount) => {
                const { collection, addDoc, serverTimestamp } = window.FB;
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'fines'), { playerId: pId, reason, amount, paid: false, timestamp: serverTimestamp() });
            };

            const openVotesCount = useMemo(() => {
                if (!user || user.id === 'hc' || user.id === 'tm') return 0;
                return schedule.filter(e => new Date(e.date) >= new Date().setHours(0,0,0,0) && (!votesData[`event_${e.id}`] || !votesData[`event_${e.id}`][user.id])).length;
            }, [schedule, votesData, user]);

            const squadGoals = useMemo(() => {
                const map = {};
                schedule.forEach(ev => { if (ev.stats?.players) { Object.entries(ev.stats.players).forEach(([pid, s]) => map[pid] = (map[pid] || 0) + (parseInt(s.g) || 0)); } });
                return map;
            }, [schedule]);

            const mvpWins = useMemo(() => {
                const counts = {};
                Object.values(mvpVotes).forEach(gameVotes => {
                    const gameCounts = {};
                    Object.values(gameVotes).forEach(pid => gameCounts[pid] = (gameCounts[pid] || 0) + 1);
                    let max = 0; let winners = [];
                    Object.entries(gameCounts).forEach(([pid, c]) => { if(c > max) { max = c; winners = [pid]; } else if (c === max) { winners.push(pid); } });
                    winners.forEach(pid => counts[pid] = (counts[pid] || 0) + 1);
                });
                return counts;
            }, [mvpVotes]);

            if (loading) return ( <div className="min-h-screen bg-[#050505] flex items-center justify-center"><RebelLogo className="w-24 h-24 animate-pulse" /></div> );
            
            if (showPublicShop) return <PublicTicketShop db={db} schedule={schedule} ticketPrices={ticketPrices} onBack={() => setShowPublicShop(false)} />;

            if (!user) return (
                <div className="min-h-screen flex flex-col items-center justify-center p-6 bg-[#050505]">
                    <div className="w-full max-w-md bg-[#111] p-10 rounded-[3rem] border border-[#FF007F]/20 shadow-2xl text-center">
                        <RebelLogo className="w-24 h-24 mx-auto mb-8" />
                        <form onSubmit={handleLogin} className="space-y-6">
                            <select className="w-full bg-black border border-zinc-800 rounded-2xl py-4 px-5 text-white" value={loginData.id} onChange={e => setLoginData({...loginData, id: e.target.value})}>
                                <option value="" disabled>Wer bist du?</option>
                                {SQUAD_DATA.map(m => <option key={m.id} value={m.id}>{m.name}</option>)}
                            </select>
                            <input type="password" placeholder="Passwort" className="w-full bg-black border border-zinc-800 rounded-2xl py-4 px-5 text-white text-center" value={loginData.pw} onChange={e => setLoginData({...loginData, pw: e.target.value})}/>
                            <button type="submit" className="w-full bg-[#FF007F] text-white font-black py-4 rounded-2xl uppercase shadow-lg">Login</button>
                        </form>
                        <button onClick={() => setShowPublicShop(true)} className="mt-8 text-zinc-500 font-bold uppercase text-[10px] tracking-widest border border-white/5 py-3 px-6 rounded-full italic">Fan-Ticket Kaufen 🎟️</button>
                    </div>
                </div>
            );

            const isAdmin = user.id === 'hc' || user.id === 'tm';

            return (
                <div className="min-h-screen bg-[#050505]">
                    <header className="p-6 pt-[calc(env(safe-area-inset-top)+1.5rem)] flex justify-between items-center bg-black/50 backdrop-blur-md sticky top-0 z-50 border-b border-white/5">
                        <div className="flex items-center gap-3"><RebelLogo className="w-9 h-9" status="connected" /><h2 className="rebel-font font-black italic text-lg uppercase text-white">Rebel Hub</h2></div>
                        <div className="flex items-center gap-2"><button onClick={() => { setUser(null); localStorage.removeItem('rebel_hub_user_id'); }} className="text-zinc-500 p-2"><RebelIcon name="log-out" size={18}/></button></div>
                    </header>
                    <main className="p-6 max-w-4xl mx-auto animate-slide-up">
                        {activeTab === 'dashboard' && <DashboardView me={user} schedule={schedule} shoutbox={shoutbox} profiles={profiles} isAdmin={isAdmin} goals={squadGoals} announcement={announcement} votesData={votesData} openVotesCount={openVotesCount} setActiveTab={setActiveTab} onVote={(id,v)=>{ const { doc, setDoc } = window.FB; setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'team_votes', `event_${id}`), { [user.id]: v }, { merge: true }); }} onPostShout={handlePostShout} triggerHype={() => { if (window.confetti) window.confetti(); }} />}
                        {activeTab === 'votes' && <LongTermVotes schedule={schedule} votesData={votesData} userId={user.id} onVote={(id,val) => { const { doc, setDoc } = window.FB; setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'team_votes', `event_${id}`), { [user.id]: val }, { merge: true }); }} isAdmin={isAdmin} onAddFine={handleAddFine} triggerHype={() => { if (window.confetti) window.confetti(); }} />}
                        {activeTab === 'squad' && <SquadView profiles={profiles} goals={squadGoals} mvpWins={mvpWins} health={health} />}
                        {activeTab === 'treasury' && isAdmin && <TreasuryView fines={fines} transactions={transactions} isAdmin={isAdmin} myId={user.id} onAddTransaction={async t => { const { collection, addDoc, serverTimestamp } = window.FB; await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'treasury'), { ...t, timestamp: serverTimestamp() }); }} />}
                        {activeTab === 'fines' && <div className="text-white space-y-4">
                            <h2 className="text-2xl font-black italic uppercase">Strafliste</h2>
                            {fines.filter(f => !f.paid).map(f => (
                                <div key={f.id} className="bg-[#111] p-4 rounded-2xl flex justify-between items-center border border-white/5">
                                    <div><p className="font-bold text-sm text-white">{SQUAD_DATA.find(s=>s.id===f.playerId)?.name}</p><p className="text-[10px] text-zinc-500">{f.reason}</p></div>
                                    <div className="flex items-center gap-3"><span className="font-black text-[#FF007F]">{f.amount} €</span>{isAdmin && <button onClick={async ()=>{ const { doc, updateDoc } = window.FB; await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'fines', f.id), { paid: true }); }} className="bg-green-500/20 text-green-500 p-2 rounded-lg"><RebelIcon name="check" size={16}/></button>}</div>
                                </div>
                            ))}
                        </div>}
                        {activeTab === 'profil' && <div className="text-white space-y-8">
                            <h2 className="text-2xl font-black italic uppercase">Mein Profil</h2>
                            <div className="space-y-4">
                                <p className="text-xs text-zinc-500 uppercase">Hier kannst du bald deine Werte (Grip, Vibe...) selbst anpassen, sofern Heiko dich nicht gesperrt hat!</p>
                                <button className="w-full bg-[#111] border border-white/10 p-4 rounded-xl text-xs font-black uppercase text-zinc-400">Profil bearbeiten (Coming Soon)</button>
                            </div>
                        </div>}
                    </main>

                    <nav className="fixed bottom-0 left-0 w-full backdrop-blur-xl border-t border-white/5 flex justify-around p-4 pb-[calc(env(safe-area-inset-bottom)+1rem)] z-50 bg-black/95">
                        <NavButton icon="zap" label="Rebel" active={activeTab === 'dashboard'} onClick={() => setActiveTab('dashboard')} />
                        <NavButton icon="calendar-check" label="Plan" active={activeTab === 'votes'} onClick={() => setActiveTab('votes')} badgeCount={openVotesCount} />
                        <NavButton icon="users" label="Squad" active={activeTab === 'squad'} onClick={() => setActiveTab('squad')} />
                        <NavButton icon="clipboard-list" label="Strafen" active={activeTab === 'fines'} onClick={() => setActiveTab('fines')} />
                        {isAdmin && <NavButton icon="euro" label="Kasse" active={activeTab === 'treasury'} onClick={() => setActiveTab('treasury')} />}
                        <NavButton icon="user-cog" label="Settings" active={activeTab === 'profil'} onClick={() => setActiveTab('profil')} />
                    </nav>
                </div>
            );
        };
        
        const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<AppWrapper />);
    </script>
</body>
</html>
