                                    <button onClick={() => { onUpdateEvent(editingEvent.id, editingEvent); setEditingEvent(null); }} className="w-full bg-[#FF007F] text-white py-5 rounded-2xl font-black uppercase text-xs tracking-widest shadow-xl mt-4 active:scale-95 transition-transform">Änderungen speichern</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {editingStats && (
                        <div className="fixed inset-0 bg-black/95 z-[110] p-6 pt-24 overflow-y-auto no-scrollbar text-white">
                            <div className="max-w-xl mx-auto space-y-8 animate-slide-up">
                                <div className="flex justify-between items-center text-white text-white"><h2 className="rebel-font font-black italic uppercase text-xl text-white">STATS: {editingStats.label}</h2><button onClick={()=>setEditingStats(null)} className="text-white"><RebelIcon name="x" size={32}/></button></div>
                                <form onSubmit={async (e) => { e.preventDefault(); const fd = new FormData(e.target); const s = { players: {} }; SQUAD_DATA.forEach(sq => { s.players[sq.id] = { g: fd.get(`g_${sq.id}`), p: fd.get(`p_${sq.id}`), y: fd.get(`y_${sq.id}`)==='on', r: fd.get(`r_${sq.id}`)==='on', b: fd.get(`b_${sq.id}`)==='on' }; }); await onSaveStats(editingStats.id, s); setEditingStats(null); }} className="space-y-6"><div className="space-y-3">{SQUAD_DATA.map(s => <div key={s.id} className="bg-white/5 p-4 rounded-[1.5rem] flex flex-wrap items-center gap-4 border border-white/5 text-white"><span className="text-white font-black italic text-xs w-24 truncate text-left text-white">{s.name}</span><input name={`g_${s.id}`} type="number" placeholder="G" defaultValue={editingStats.stats?.players?.[s.id]?.g} className="w-12 bg-black border border-white/10 rounded-xl p-3 text-center text-xs text-white" /><input name={`p_${s.id}`} type="number" placeholder="2M" defaultValue={editingStats.stats?.players?.[s.id]?.p} className="w-12 bg-black border border-white/10 rounded-xl p-3 text-center text-xs text-white" /><div className="flex gap-2"><label className="text-yellow-500 cursor-pointer text-white"><input name={`y_${s.id}`} type="checkbox" className="hidden peer text-white" defaultChecked={editingStats.stats?.players?.[s.id]?.y}/><span className="w-8 h-8 border border-yellow-500/30 rounded-lg flex items-center justify-center peer-checked:bg-yellow-500 peer-checked:text-black font-black text-[10px] text-white">Y</span></label><label className="text-red-500 cursor-pointer text-white"><input name={`r_${s.id}`} type="checkbox" className="hidden peer text-white" defaultChecked={editingStats.stats?.players?.[s.id]?.r}/><span className="w-8 h-8 border border-red-500/30 rounded-lg flex items-center justify-center peer-checked:bg-red-500 peer-checked:text-black font-black text-[10px] text-white">R</span></label></div></div>)}</div><button type="submit" className="w-full bg-[#FF007F] text-white py-5 rounded-3xl font-black uppercase shadow-2xl text-white">Stats Speichern</button></form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const AppWrapper = () => {
            const [showPublicShop, setShowPublicShop] = useState(false);
            const [user, setUser] = useState(null); 
            const [activeTab, setActiveTab] = useState('dashboard');
            const [loginData, setLoginData] = useState({ id: '', pw: '' });
            const [loginError, setLoginError] = useState('');
            const [votesData, setVotesData] = useState({});
            const [shoutbox, setShoutbox] = useState([]);
            const [profiles, setProfiles] = useState({});
            const [schedule, setSchedule] = useState([]);
            const [health, setHealth] = useState({});
            const [fines, setFines] = useState([]);
            const [transactions, setTransactions] = useState([]);
            const [announcement, setAnnouncement] = useState("");
            const [ticketPrices, setTicketPrices] = useState({ adults: 5, children: 2 });
            const [theme, setTheme] = useState('dark');
            const [db, setDb] = useState(null);
            const [loading, setLoading] = useState(true);
            const [cloudStatus, setCloudStatus] = useState('connecting');
            const [voteHistory, setVoteHistory] = useState([]);
            const [cart, setCart] = useState([]);
            const [isCartOpen, setIsCartOpen] = useState(false);
            const [showDebugInfo, setShowDebugInfo] = useState(false);
            const [mvpVotes, setMvpVotes] = useState({});
            const [allCarpools, setAllCarpools] = useState({});
            const [rebelCamPhotos, setRebelCamPhotos] = useState([]);
            const [treasuryGoal, setTreasuryGoal] = useState({ label: 'Mannschaftsfahrt', target: 1000 });
            const [tickets, setTickets] = useState([]);

            useEffect(() => {
                const startApp = async () => {
                    let attempts = 0;
                    while (!window.FB && attempts < 20) { await new Promise(r => setTimeout(r, 100)); attempts++; }
                    if (!window.FB) { setLoading(false); return; }
                    try {
                        const { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, getFirestore, getMessaging, onMessage } = window.FB;
                        const app = initializeApp(firebaseConfig);
                        const auth = getAuth(app);
                        const firestore = getFirestore(app);
                        
                        // NEU: Messaging initialisieren und global verfügbar machen
                        window.FCM = getMessaging(app);
                        setDb(firestore);

                        // NEU: Wenn die App gerade GEÖFFNET ist und eine Push reinkommt
                        onMessage(window.FCM, (payload) => {
                            alert(`🚨 REBEL NEWS: ${payload.notification.title}\n\n${payload.notification.body}`);
                        });

                        await signInAnonymously(auth);
                        onAuthStateChanged(auth, (u) => {
                            if (u) {
                                setCloudStatus('connected');
                                const savedId = localStorage.getItem('rebel_hub_user_id');
                                if (savedId) { const found = SQUAD_DATA.find(m => m.id === savedId); if (found) setUser(found); }
                            }
                            setLoading(false);
                        });
                    } catch (e) { setLoading(false); }
                };
                startApp();
            }, []);

            useEffect(() => {
                if (!db || !window.FB) return;
                const { collection, onSnapshot, doc } = window.FB;
                
                const unsubVotes = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'team_votes'), snap => { const d = {}; snap.forEach(doc => d[doc.id] = doc.data()); setVotesData(d); });
                const unsubShout = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'shoutbox'), snap => { const msgs = []; snap.forEach(d => msgs.push({ id: d.id, ...d.data() })); msgs.sort((a,b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0)); setShoutbox(msgs.slice(0, 50)); });
                const unsubProfiles = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'profiles'), snap => { const d = {}; snap.forEach(doc => d[doc.id] = doc.data()); setProfiles(d); });
                const unsubSchedule = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'schedule'), snap => { const list = []; snap.forEach(doc => list.push({ id: doc.id, ...doc.data() })); list.sort((a,b) => new Date(a.date) - new Date(b.date)); setSchedule(list); });
                const unsubHealth = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'health'), snap => { const d = {}; snap.forEach(doc => d[doc.id] = doc.data()); setHealth(d); });
                const unsubFines = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'fines'), snap => { const list = []; snap.forEach(d => list.push({ id: d.id, ...d.data() })); setFines(list); });
                const unsubTrans = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'treasury'), snap => { const list = []; snap.forEach(d => list.push({ id: d.id, ...d.data() })); setTransactions(list); });
                const unsubHistory = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'vote_history'), snap => { const list = []; snap.forEach(doc => list.push({ id: doc.id, ...doc.data() })); list.sort((a,b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0)); setVoteHistory(list.slice(0, 50)); });
                const unsubMvp = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'mvp_votes'), snap => { const d = {}; snap.forEach(doc => d[doc.id] = doc.data()); setMvpVotes(d); });
                const unsubNews = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'globals', 'news'), snap => { if(snap.exists()) setAnnouncement(snap.data().text || ""); });
                const unsubPrices = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'globals', 'ticket_prices'), snap => { if(snap.exists()) setTicketPrices(snap.data()); });
                const unsubCarpools = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'carpools'), snap => { const d = {}; snap.forEach(doc => d[doc.id] = doc.data()); setAllCarpools(d); });
                const unsubCam = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'rebel_cam'), snap => { const list = []; snap.forEach(doc => list.push({ id: doc.id, ...doc.data() })); list.sort((a,b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0)); setRebelCamPhotos(list.slice(0, 20)); });
                const unsubGoal = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'globals', 'treasury_goal'), snap => { if(snap.exists()) setTreasuryGoal(snap.data()); });
                const unsubTickets = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'tickets'), snap => { const list = []; snap.forEach(doc => list.push({ id: doc.id, ...doc.data() })); setTickets(list); });
                
                return () => { unsubVotes(); unsubShout(); unsubProfiles(); unsubSchedule(); unsubHealth(); unsubFines(); unsubTrans(); unsubHistory(); unsubMvp(); unsubNews(); unsubPrices(); unsubCarpools(); unsubCam(); unsubGoal(); unsubTickets(); };
            }, [db]);

            const handleLogin = (e) => { e.preventDefault(); const found = SQUAD_DATA.find(m => m.id === loginData.id); if (found && found.pw === loginData.pw) { setUser(found); localStorage.setItem('rebel_hub_user_id', found.id); } else { setLoginError('Passwort ungültig.'); } };

            const handleAddFine = async (pId, reason, amount) => {
                if(!db) return;
                const { collection, addDoc, serverTimestamp } = window.FB;
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'fines'), { playerId: pId, reason, amount, paid: false, timestamp: serverTimestamp() });
                if (window.confetti) window.confetti({ particleCount: 50, colors: ['#FF007F'] });
            };

            const handlePayFine = async (fId) => {
                if(!db) return;
                const { doc, updateDoc } = window.FB;
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'fines', fId), { paid: true });
            };

            const handleUnpayFine = async (fId) => {
                if(!db) return;
                const { doc, updateDoc } = window.FB;
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'fines', fId), { paid: false });
            };

            const handleDeleteFine = async (fId) => {
                if(window.confirm('Strafe wirklich löschen?')) {
                    if(!db) return;
                    const { doc, deleteDoc } = window.FB;
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'fines', fId));
                }
            };

            const handleIncreaseFine = async (fId, currentAmount, currentReason) => {
                const addAmountStr = window.prompt('Um wie viel Euro soll die Strafe erhöht werden?', '2');
                if(!addAmountStr) return;
                const addAmount = parseFloat(addAmountStr.replace(',', '.'));
                if(isNaN(addAmount) || addAmount <= 0) return;
                
                if(!db) return;
                const { doc, updateDoc } = window.FB;
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'fines', fId), { 
                    amount: currentAmount + addAmount,
                    reason: currentReason + ' (+ Erhöhung)'
                });
            };

            const handleAddTransaction = async (t) => {
                if(!db) return;
                const { collection, addDoc, serverTimestamp } = window.FB;
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'treasury'), { ...t, timestamp: serverTimestamp() });
            };

            const handleDeleteTransaction = async (tId) => {
                if(!db) return;
                const { doc, deleteDoc } = window.FB;
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'treasury', tId));
            };

            const handleVoteMvp = async (eventId, playerId) => {
                if(!db) return;
                const { doc, setDoc } = window.FB;
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'mvp_votes', `event_${eventId}`), { [user.id]: playerId }, { merge: true });
                triggerHype();
            };

            const handleUploadPhoto = async (base64) => {
             if(!db) return;
             const { collection, addDoc, serverTimestamp } = window.FB;
             try {
                 await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'rebel_cam'), { url: base64, userId: user.id, userName: user.name, timestamp: serverTimestamp() });
                 if (window.confetti) window.confetti({ particleCount: 80, colors: ['#FF007F', '#ffffff'] });
             } catch (e) { alert("Fehler beim Hochladen."); }
             };

             const handleDeletePhoto = async (id) => {
                 if(window.confirm('Foto wirklich löschen?')) {
                 const { doc, deleteDoc } = window.FB;
                 await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'rebel_cam', id));
             }
             };

            const triggerHype = () => { if (window.confetti) window.confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#FF007F', '#ffffff'] }); };
            const triggerBalloons = () => { if (!window.confetti) return; const end = Date.now() + 3000; const frame = () => { window.confetti({ particleCount: 5, origin: { x: Math.random(), y: 0.8 }, colors: ['#FF007F', '#ffffff'] }); if (Date.now() < end) requestAnimationFrame(frame); }; frame(); };
            
            const addToCart = (product, size) => { setCart([...cart, { ...product, cartId: Date.now(), selectedSize: size }]); triggerHype(); };
            const removeFromCart = (cartId) => { setCart(cart.filter(item => item.cartId !== cartId)); };
            
            const handleCheckout = () => { 
                const itemsList = cart.map(i => `- ${i.name} (${i.selectedSize})`).join('\n'); 
                const total = cart.reduce((sum, i) => sum + i.price, 0); 
                const rawMsg = "Hey Kai, ich (" + user.name + ") würde gerne im Rebel Shop bestellen:\n\n" + itemsList + "\n\nGesamt: " + total + "€\n\nBitte bestätigen! \uD83D\uDECD\uFE0F"; 
                window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(rawMsg)}`, '_blank'); 
                setCart([]); 
                setIsCartOpen(false); 
            };
            
            const attendanceData = useMemo(() => {
                const map = {};
                SQUAD_DATA.forEach(p => {
                    let totalVoted = 0, dabeiCount = 0;
                    Object.keys(votesData).forEach(key => {
                        if (key.startsWith('event_') && votesData[key][p.id]) {
                            totalVoted++;
                            if (votesData[key][p.id] === 'Dabei') dabeiCount++;
                        }
                    });
                    map[p.id] = totalVoted === 0 ? 0 : Math.round((dabeiCount / totalVoted) * 100);
                });
                return map;
            }, [votesData]);

            const squadGoals = useMemo(() => {
                const map = {};
                schedule.forEach(ev => {
                    if (ev.stats?.players) {
                        Object.entries(ev.stats.players).forEach(([pid, s]) => map[pid] = (map[pid] || 0) + (parseInt(s.g) || 0));
                    }
                });
                return map;
            }, [schedule]);

            const mvpWins = useMemo(() => {
                const counts = {};
                Object.values(mvpVotes).forEach(gameVotes => {
                    const gameCounts = {};
                    Object.values(gameVotes).forEach(pid => gameCounts[pid] = (gameCounts[pid] || 0) + 1);
                    let max = 0;
                    let winners = [];
                    Object.entries(gameCounts).forEach(([pid, c]) => {
                        if(c > max) { max = c; winners = [pid]; }
                        else if (c === max) { winners.push(pid); }
                    });
                    winners.forEach(pid => counts[pid] = (counts[pid] || 0) + 1);
                });
                return counts;
            }, [mvpVotes]);

            const openVotesCount = useMemo(() => {
                if (!user || user.id === 'hc' || user.id === 'tm') return 0;
                const now = new Date().setHours(0,0,0,0);
                return schedule.filter(e => new Date(e.date) >= now && (!votesData[`event_${e.id}`] || !votesData[`event_${e.id}`][user.id])).length;
            }, [schedule, votesData, user]);

            if (loading) return ( <div className="min-h-screen bg-[#050505] flex flex-col items-center justify-center text-white"><RebelLogo className="w-24 h-24 animate-pulse" status={cloudStatus} /></div> );
            
            if (showPublicShop) return <PublicTicketShop db={db} schedule={schedule} ticketPrices={ticketPrices} onBack={() => setShowPublicShop(false)} />;

            if (!user) return (
                <div className="min-h-screen flex flex-col items-center justify-center p-6 bg-[#050505]">
                    <div className="w-full max-w-md bg-[#111] p-10 rounded-[3rem] border border-[#FF007F]/20 shadow-2xl animate-slide-up text-center">
                        <RebelLogo className="w-24 h-24 mx-auto mb-8" />
                        <form onSubmit={handleLogin} className="space-y-6 mb-8">
                            <select className="w-full bg-black border border-zinc-800 rounded-2xl py-4 px-5 text-white outline-none appearance-none" value={loginData.id} onChange={e => setLoginData({...loginData, id: e.target.value})}>
                                <option value="" disabled>Identität wählen</option>
                                {SQUAD_DATA.map(m => <option key={m.id} value={m.id}>{m.name}</option>)}
                            </select>
                            <input type="password" placeholder="Passwort" className="w-full bg-black border border-zinc-800 rounded-2xl py-4 px-5 text-white text-center outline-none focus:border-[#FF007F]" value={loginData.pw} onChange={e => setLoginData({...loginData, pw: e.target.value})}/>
                            {loginError && <p className="text-[#FF007F] text-xs font-bold">{loginError}</p>}
                            <button type="submit" className="w-full bg-[#FF007F] text-white font-black py-4 rounded-2xl uppercase tracking-widest shadow-[0_0_20px_rgba(255,0,127,0.4)]">Anmelden</button>
                        </form>
                        <div className="border-t border-white/10 pt-8">
                            <p className="text-zinc-500 text-[10px] uppercase font-bold tracking-widest mb-4">Zuschauer & Fans</p>
                            <button onClick={() => setShowPublicShop(true)} className="w-full bg-white text-black font-black py-4 rounded-2xl uppercase tracking-widest flex justify-center items-center gap-2">🎟️ Fan-Tickets kaufen</button>
                        </div>
                    </div>
                </div>
            );

            const isAdmin = user.id === 'hc' || user.id === 'tm';

            return (
                <div className={`min-h-screen pb-32 transition-all duration-500 ${theme === 'light' ? 'bg-[#f4f4f5] text-[#18181b]' : 'bg-[#050505] text-zinc-300'}`}>
                    <header className={`p-6 pt-[calc(env(safe-area-inset-top)+1.5rem)] flex justify-between items-center border-b border-white/5 backdrop-blur-md sticky top-0 z-50 ${theme === 'light' ? 'bg-white/80' : 'bg-black/50'}`}>
                        <div className="flex items-center gap-3"><RebelLogo className="w-9 h-9" status={cloudStatus} onClick={() => setShowDebugInfo(!showDebugInfo)} /><h2 className={`rebel-font font-black italic text-lg uppercase ${theme==='light'?'text-black':'text-white'}`}>Rebel Hub</h2></div>
                        <div className="flex items-center gap-2"><button onClick={() => setTheme(t => t === 'dark' ? 'light' : 'dark')} className="text-zinc-500 p-2"><RebelIcon name={theme === 'dark' ? 'sun' : 'moon'} size={18}/></button><button onClick={triggerHype} className="text-[#FF007F] p-2"><RebelIcon name="sparkles" size={18}/></button><button onClick={() => { setUser(null); localStorage.removeItem('rebel_hub_user_id'); }} className="text-zinc-500 p-2"><RebelIcon name="log-out" size={18}/></button></div>
                    </header>
                    <main className="p-6 max-w-4xl mx-auto animate-slide-up">
                        {activeTab === 'dashboard' && <DashboardView db={db} me={user} schedule={schedule} shoutbox={shoutbox} profiles={profiles} onPostShout={async (t, a) => { const { collection, addDoc, serverTimestamp } = window.FB; await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'shoutbox'), { userId: a ? 'anon' : user.id, userName: a ? 'Geheimagentin 🕵️‍♀️' : user.name, text: t, timestamp: serverTimestamp() }); if (t.match(/sieg|hype|rebel/i)) triggerHype(); }} triggerBalloons={triggerBalloons} onVote={(id,val) => { const { doc, setDoc, addDoc, collection, serverTimestamp } = window.FB; const ev = schedule.find(e => e.id === id); setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'team_votes', `event_${id}`), { [user.id]: val }, { merge: true }); addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'vote_history'), { userId: user.id, userName: user.name, eventLabel: ev?.label || 'Planung', voteValue: val, timestamp: serverTimestamp() }); }} votesData={votesData} isAdmin={isAdmin} goals={squadGoals} theme={theme} announcement={announcement} onDeleteShout={async (id) => { const { doc, deleteDoc } = window.FB; await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'shoutbox', id)); }} openVotesCount={openVotesCount} setActiveTab={setActiveTab} allCarpools={allCarpools} fines={fines} transactions={transactions} treasuryGoal={treasuryGoal} tickets={tickets} />}
                        {activeTab === 'votes' && <LongTermVotes schedule={schedule} votesData={votesData} userId={user.id} onVote={(id,val) => { const { doc, setDoc, addDoc, collection, serverTimestamp } = window.FB; const ev = schedule.find(e => e.id === id); setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'team_votes', `event_${id}`), { [user.id]: val }, { merge: true }); addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'vote_history'), { userId: user.id, userName: user.name, eventLabel: ev?.label || 'Planung', voteValue: val, timestamp: serverTimestamp() }); }} health={health['current'] || {}} profiles={profiles} theme={theme} isAdmin={isAdmin} onAddFine={handleAddFine} triggerHype={triggerHype} allCarpools={allCarpools} onUpdateEvent={async (id,d) => { const { doc, updateDoc } = window.FB; await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'schedule', id), d); }} />}
                        {activeTab === 'kabine' && (
                            <div className="space-y-4 pb-10">
                                <header>
                                    <h2 className={`text-2xl rebel-font font-black italic uppercase ${theme==='light'?'text-black':'text-white'}`}>Die Kabine</h2>
                                    <p className="text-sm text-zinc-500 uppercase tracking-widest">Team-Life & Fun</p>
                                </header>
                                <KabinenGluecksrad theme={theme} />
                                <RebelCam photos={rebelCamPhotos} onUpload={handleUploadPhoto} onDelete={handleDeletePhoto} me={user} isAdmin={isAdmin} />
                                {/* NEUER DIENSTPLAN */}
                                <TeamDutiesWidget schedule={schedule} votesData={votesData} userId={user.id} isAdmin={isAdmin} triggerHype={triggerHype} theme={theme} onUpdateEvent={async (id,d) => { const { doc, updateDoc } = window.FB; await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'schedule', id), d); }} />
                                <GeneralPollsView votesData={votesData} userId={user.id} onVote={async (id, val) => { const { doc, setDoc } = window.FB; await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'team_votes', id), { [user.id]: val }, { merge: true }); }} isAdmin={isAdmin} theme={theme} schedule={schedule} mvpVotes={mvpVotes} onVoteMvp={handleVoteMvp} />
                            </div>
                        )}
                        {activeTab === 'squad' && <SquadView myId={user.id} profiles={profiles} health={health['current'] || {}} goals={squadGoals} theme={theme} attendance={attendanceData} mvpWins={mvpWins} />}
                        {activeTab === 'base' && <BaseView theme={theme} />}
                        {activeTab === 'scanner' && isAdmin && <TicketScannerView db={db} theme={theme} tickets={tickets} schedule={schedule} />}
                        {activeTab === 'treasury' && isAdmin && <TreasuryView theme={theme} fines={fines} transactions={transactions} tickets={tickets} isAdmin={isAdmin} onAddTransaction={handleAddTransaction} onDeleteTransaction={handleDeleteTransaction} onUnpayFine={handleUnpayFine} myId={user.id} treasuryGoal={treasuryGoal} onUpdateGoal={async (g) => { const { doc, setDoc } = window.FB; await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'globals', 'treasury_goal'), g); }} />}
                        {activeTab === 'fines' && <FinesView theme={theme} fines={fines} myId={user.id} isAdmin={isAdmin} onAddFine={handleAddFine} onPayFine={handlePayFine} onDeleteFine={handleDeleteFine} onIncreaseFine={handleIncreaseFine} />}
                        {activeTab === 'profil' && <ProfileManagement me={user} db={db} profile={profiles[user.id] || {}} profiles={profiles} health={health['current'] || {}} schedule={schedule} voteHistory={voteHistory} ticketPrices={ticketPrices} theme={theme} onSave={async (d, targetId) => { const { doc, setDoc } = window.FB; await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'profiles', targetId || user.id), d, { merge: true }); alert('Profil erfolgreich gespeichert! 💾'); }} onHealthUpdate={async s => { const { doc, setDoc } = window.FB; await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'health', 'current'), { [user.id]: s }, { merge: true }); }} onAddEvent={async (e) => { const { collection, addDoc } = window.FB; await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'schedule'), e); }} onDeleteEvent={async id => { const { doc, deleteDoc } = window.FB; await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'schedule', id)); }} onUpdateEvent={async (id,d) => { const { doc, updateDoc } = window.FB; await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'schedule', id), d); }} onSaveStats={async (id,s) => { const { doc, setDoc } = window.FB; await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'schedule', id), { stats: s }, { merge: true }); }} onUpdateNews={async (t) => { const { doc, setDoc } = window.FB; await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'globals', 'news'), { text: t }); }} onUpdateTicketPrices={async (p) => { const { doc, setDoc } = window.FB; await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'globals', 'ticket_prices'), p); }} announcement={announcement} squadGoals={squadGoals} voteHistory={voteHistory} votesData={votesData} />}
                    </main>

                    {showDebugInfo && (
                        <div className="fixed inset-0 z-[120] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm" onClick={() => setShowDebugInfo(false)}>
                            <div className="bg-[#111] border border-[#FF007F] p-6 rounded-3xl w-full max-w-sm shadow-[0_0_30px_rgba(255,0,127,0.3)] animate-slide-up" onClick={e => e.stopPropagation()}>
                                <h3 className="rebel-font font-black italic text-2xl text-white mb-4">SYSTEM STATUS</h3>
                                <div className="space-y-3 text-sm font-mono text-zinc-400">
                                    <div className="flex justify-between border-b border-white/10 pb-2"><span>Cloud Status</span><span className={cloudStatus === 'connected' ? "text-green-500 font-bold" : "text-red-500 font-bold"}>{cloudStatus.toUpperCase()}</span></div>
                                    <div className="flex justify-between border-b border-white/10 pb-2"><span>Profiles Loaded</span><span className="text-white">{Object.keys(profiles).length}</span></div>
                                    <div className="flex justify-between border-b border-white/10 pb-2"><span>Events Loaded</span><span className="text-white">{schedule.length}</span></div>
                                    <div className="flex justify-between border-b border-white/10 pb-2"><span>Votes Loaded</span><span className="text-white">{Object.keys(votesData).length}</span></div>
                                    <div className="flex justify-between border-b border-white/10 pb-2"><span>Shoutbox Msgs</span><span className="text-white">{shoutbox.length}</span></div>
                                    <div className="flex justify-between border-b border-white/10 pb-2"><span>MVP DB Rows</span><span className="text-white">{Object.keys(mvpVotes).length}</span></div>
                                    <div className="flex justify-between pb-2"><span>App ID</span><span className="text-[10px]">{appId}</span></div>
                                </div>
                                <button onClick={() => setShowDebugInfo(false)} className="w-full mt-6 bg-[#FF007F] text-white font-black uppercase py-3 rounded-xl">Close Terminal</button>
                            </div>
                        </div>
                    )}

                    {isCartOpen && (
                        <div className="fixed inset-0 z-[100] flex justify-end">
                            <div className="absolute inset-0 bg-black/80 backdrop-blur-sm" onClick={() => setIsCartOpen(false)}></div>
                            <div className="relative w-full max-w-sm bg-[#111] h-full shadow-2xl p-6 flex flex-col animate-slide-up border-l border-white/10">
                                <div className="flex justify-between items-center mb-6"><h2 className="rebel-font font-black italic uppercase text-2xl text-white">Dein Korb</h2><button onClick={() => setIsCartOpen(false)} className="text-zinc-500"><RebelIcon name="x" size={24}/></button></div>
                                <div className="flex-grow overflow-y-auto no-scrollbar space-y-4">
                                    {cart.length === 0 ? (<div className="text-center text-zinc-600 mt-20"><RebelIcon name="shopping-bag" size={48} className="mx-auto mb-4 opacity-30" /><p className="text-sm font-bold uppercase">Nix drin.</p></div>) : (cart.map(item => (<div key={item.cartId} className="bg-white/5 p-4 rounded-2xl flex gap-4 items-center"><img src={item.img} alt={item.name} className="w-16 h-16 object-cover rounded-xl" /><div className="flex-grow"><h4 className="font-bold text-white text-sm uppercase italic">{item.name}</h4><p className="text-xs text-zinc-500 font-bold">Größe: {item.selectedSize}</p><p className="text-[#FF007F] font-black text-sm">{item.price} €</p></div><button onClick={() => removeFromCart(item.cartId)} className="text-zinc-600 hover:text-red-500"><RebelIcon name="trash-2" size={18} /></button></div>)))}
                                </div>
                                {cart.length > 0 && (<div className="pt-6 border-t border-white/10 space-y-4"><div className="flex justify-between text-white font-black uppercase text-xl"><span>Gesamt</span><span className="text-[#FF007F]">{cart.reduce((sum, i) => sum + i.price, 0)} €</span></div><button onClick={handleCheckout} className="w-full bg-[#FF007F] text-white py-4 rounded-xl font-black uppercase tracking-widest flex items-center justify-center gap-2 shadow-[0_0_20px_rgba(255,0,127,0.4)]"><RebelIcon name="message-circle" size={20} />Bestellen</button><p className="text-[9px] text-zinc-500 text-center uppercase">Bestellung wird per WhatsApp an Kai gesendet.</p></div>)}
                            </div>
                        </div>
                    )}

                    <nav className={`fixed bottom-0 left-0 w-full backdrop-blur-xl border-t border-white/5 flex justify-around p-4 pb-[calc(env(safe-area-inset-bottom)+1rem)] z-50 overflow-x-auto no-scrollbar shadow-2xl ${theme === 'light' ? 'bg-white/95' : 'bg-black/95'}`}>
                        <NavButton icon="zap" label="Rebel" active={activeTab === 'dashboard'} onClick={() => setActiveTab('dashboard')} />
                        <NavButton icon="calendar-check" label="Plan" active={activeTab === 'votes'} onClick={() => setActiveTab('votes')} badgeCount={openVotesCount} />
                        <NavButton icon="dices" label="Kabine" active={activeTab === 'kabine' || activeTab === 'poll'} onClick={() => setActiveTab('kabine')} />
                        <NavButton icon="users" label="Squad" active={activeTab === 'squad'} onClick={() => setActiveTab('squad')} />
                        <NavButton icon="clipboard-list" label="Strafen" active={activeTab === 'fines'} onClick={() => setActiveTab('fines')} />
                        {isAdmin && <NavButton icon="qr-code" label="Scanner" active={activeTab === 'scanner'} onClick={() => setActiveTab('scanner')} />}
                        {isAdmin && <NavButton icon="euro" label="Kasse" active={activeTab === 'treasury'} onClick={() => setActiveTab('treasury')} />}
                        <NavButton icon="user-cog" label="Settings" active={activeTab === 'profil'} onClick={() => setActiveTab('profil')} />
                    </nav>
                </div>
            );
        };
        
        const App = () => <AppWrapper />;
        const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
    </script>
</body>
</html>
