        body { font-family: 'Lato', sans-serif; transition: background-color 0.3s, color 0.3s; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        .no-scrollbar::-webkit-scrollbar { display: none; }

        .glass-card { backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); transition: all 0.3s ease; }

            border: 3px solid var(--rebel-pink);
            box-shadow: 0 0 35px rgba(255, 0, 127, 0.5);
            background: linear-gradient(135deg, #050505 0%, #4a0026 100%) !important;
            color: white !important;
            animation: pulse-border 2s infinite;
        }

        @keyframes pulse-border { 0%, 100% { border-color: var(--rebel-pink); } 50% { border-color: #ff5eb3; } }

        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--rebel-pink); }
        input:checked + .slider:before { transform: translateX(20px); }

        .stats-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { border-collapse: separate; border-spacing: 0 8px; }

        .shop-card-hover:active { transform: scale(0.98); }
        
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%; background: #FF007F; cursor: pointer; margin-top: -6px; box-shadow: 0 0 10px rgba(255,0,127,0.8); }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; cursor: pointer; background: rgba(255,255,255,0.1); border-radius: 2px; }

        #reader { border-radius: 1rem; overflow: hidden; border: 2px solid #FF007F; }
        #reader video { object-fit: cover; }
    </style>
</head>

        // --- HELPER COMPONENTS ---

        const RebelLogo = ({ className = "w-12 h-12", status = "connecting", onClick }) => (

                <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-[0_0_8px_rgba(255,0,127,0.5)]">

        const RebelIcon = ({ name, size = 24, className = "" }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (window.lucide && containerRef.current) {
                    containerRef.current.innerHTML = '';
                    const i = document.createElement('i');
                    const iconName = name ? name.replace(/([a-z])([A-Z])/g, '$1-$2').toLowerCase() : 'zap';
                    i.setAttribute('data-lucide', iconName);
                    i.style.width = `${size}px`; i.style.height = `${size}px`;
                    i.className = className;
                    containerRef.current.appendChild(i);
                    window.lucide.createIcons({ elements: [i] });
                }
            }, [name, size, className]);
            return <span ref={containerRef} style={{ display: 'inline-flex', width: size, height: size }}></span>;
        };

        // NEU: NavButton mit Badge
        const NavButton = ({ icon, label, active, onClick, badgeCount }) => (
            <button onClick={onClick} className={`relative flex flex-col items-center gap-1 transition-all min-w-[50px] flex-grow shrink-0 ${active ? 'text-[#FF007F] scale-110 drop-shadow-[0_0_12px_rgba(255,0,127,0.6)]' : 'text-zinc-600 hover:text-zinc-400'}`}>

                <span className="text-[8px] font-black uppercase tracking-widest mt-1">{label}</span>
                {badgeCount > 0 && (
                    <span className="absolute top-0 right-2 w-4 h-4 bg-red-600 text-white text-[9px] font-black rounded-full flex items-center justify-center border-2 border-black animate-bounce">
                        {badgeCount}
                    </span>
                )}
            </button>
        );

        // NEU: Admin Slacker Tools Komponente
        const AdminSlackerTools = ({ event, votes, squad, onAddFine, onHype }) => {
            const votedUserIds = Object.keys(votes || {});
            const slackers = squad.filter(m => m.id !== 'hc' && m.id !== 'tm' && !votedUserIds.includes(m.id));

            const handleAutoFine = () => {
                if (slackers.length === 0) return;
                if (window.confirm(`Alle ${slackers.length} Trödler mit 0,50 € bestrafen?`)) {
                    slackers.forEach(s => onAddFine(s.id, `Hub-Deadline verpasst (${event.label})`, 0.5));
                    alert("💸 Alle Strafen wurden verbucht!");
                }
            };

            const handleWhatsApp = () => {
                if (slackers.length === 0) {
                    alert("Alle haben abgestimmt! \uD83D\uDD25");
                    if(onHype) onHype();
                    return;
                }
                const names = slackers.map(s => s.name).join(', ');
                // 100% sichere Unicode-Emojis: 🚨, 👉, ⚡
                const rawText = "\uD83D\uDEA8 *REBEL REMINDER* \uD83D\uDEA8\n\nFür *" + event.label + "* fehlen noch Rückmeldungen von:\n\n\uD83D\uDC49 " + names + "\n\nBitte im Hub abstimmen, sonst 0,50€ Strafe! \u26A1";

            };

            return (
                <div className="mt-4 p-4 bg-black/40 rounded-2xl border border-white/5 animate-slide-up">

                        <div className="flex gap-2">

                            <button onClick={handleWhatsApp} className="bg-[#25D366] text-white px-3 py-1.5 rounded-lg text-[10px] font-black uppercase shadow-lg active:scale-95 transition-all">WhatsApp</button>
                        </div>
                    </div>
                    <div className="flex flex-wrap gap-1">
                        {slackers.map(s => <span key={s.id} className="text-[10px] font-bold text-zinc-400 bg-white/5 border border-white/10 px-2 py-0.5 rounded-md italic">{s.name}</span>)}
                    </div>
                </div>
            );
        };

       // --- PUBLIC TICKET SHOP ---
        const PublicTicketShop = ({ db, schedule, ticketPrices, onBack }) => {
            const [buyer, setBuyer] = useState({ name: '', email: '', type: 'day', gameId: '', adults: 1, children: 0 });
            const [ticketId, setTicketId] = useState(null);
            const [loading, setLoading] = useState(false);

            // Besserer Filter für zukünftige Spiele (nimmt auch die Uhrzeit mit rein)
            const upcomingGames = useMemo(() => {
                const now = new Date();
                return (schedule || [])
                    .filter(e => e.type === 'game' && new Date(e.date + 'T' + (e.time||'00:00')) >= now)
                    .sort((a,b) => new Date(a.date) - new Date(b.date));
            }, [schedule]);

            const priceAdult = ticketPrices?.adults || 5;
            const priceChild = ticketPrices?.children || 2;
            const totalPrice = buyer.type === 'season' ? 40 : (buyer.adults * priceAdult) + (buyer.children * priceChild);

            const handleDownloadQR = async () => {
                setLoading(true);
                try {
                    const element = document.getElementById('ticket-card-element');
                    if (!element) return;
                    const canvas = await window.html2canvas(element, { backgroundColor: '#111111', scale: 3, useCORS: true, allowTaint: true });
                    const image = canvas.toDataURL("image/png");
                    const link = document.createElement('a');
                    link.href = image;
                    link.download = `Rebels_${buyer.type === 'day' ? 'Tageskarte' : 'Dauerkarte'}_${buyer.name.replace(/\s+/g, '_')}.png`;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                } catch (err) { alert("Screenshot Fehler. Bitte mache manuell einen Screenshot vom Ticket."); }
                setLoading(false);
            };

            const handleBuy = async (e) => {
                e.preventDefault();
                if(!db || !buyer.name || !buyer.email) return;
                if(buyer.type === 'day' && !buyer.gameId) return alert('Bitte wähle ein Spiel aus!');
                if(buyer.type === 'day' && buyer.adults === 0 && buyer.children === 0) return alert('Bitte wähle mindestens eine Person aus!');
                
                setLoading(true);
                try {
                    const { collection, addDoc, serverTimestamp } = window.FB;
                    const selectedGame = upcomingGames.find(g => g.id === buyer.gameId);
                    
                    // WICHTIG: Das Datum direkt in den Namen brennen, für die saubere Gästeliste!
                    const finalGameLabel = selectedGame 
                        ? `${selectedGame.label} - ${new Date(selectedGame.date).toLocaleDateString('de-DE')}` 
                        : 'Alle Spiele (Saison)';

                    const docRef = await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'tickets'), {
                        ...buyer,
                        gameLabel: finalGameLabel, // <- Jetzt inkl. Datum gespeichert!
                        used: false,
                        paid: false,
                        price: totalPrice,
                        timestamp: serverTimestamp()
                    });
                    
                    setTicketId(docRef.id);

                    if (window.emailjs) {
                        try {
                            const ticketText = buyer.type === 'day' 
                                ? `Tageskarte (${totalPrice}€) - ${buyer.adults} Erw., ${buyer.children} Kind(er)\nSpiel: ${finalGameLabel}` 
                                : 'Dauerkarte (40€)';
                                
                            await window.emailjs.send(
                                "service_1clvlbc", 
                                "template_vrawvqs", 
                                {
                                    to_name: buyer.name,
                                    reply_to: buyer.email, 
                                    ticket_type: ticketText,
                                    ticket_id: docRef.id,
                                    qr_link: `https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${docRef.id}`
                                }
                            );
                        } catch (mailError) { console.error("Email Fehler:", mailError); }
                    }

                    if (window.confetti) window.confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
                } catch(err) { alert('Fehler beim Kauf.'); }
                setLoading(false);
            };

            if (ticketId) {
                const selectedGame = upcomingGames.find(g => g.id === buyer.gameId);
                return (
                    <div className="min-h-screen bg-[#050505] p-6 flex flex-col items-center justify-center animate-slide-up text-white">
                        <div id="ticket-card-element" className="bg-[#111] border border-[#FF007F]/50 p-8 rounded-[2rem] shadow-[0_0_40px_rgba(255,0,127,0.3)] max-w-sm w-full text-center relative overflow-hidden">
                            <div className="absolute top-0 left-0 w-full h-3 bg-gradient-to-r from-[#FF007F] to-purple-600"></div>
                            <h2 className="rebel-font font-black italic text-2xl uppercase mb-1 mt-2 text-white">UNITED REBELS</h2>
                            <p className="text-[#FF007F] text-sm mb-2 uppercase tracking-widest font-black">{buyer.type === 'day' ? '🎟️ Tageskarte' : '👑 Dauerkarte'}</p>
                            
                            {/* Verbessertes Ticket-Design inkl. Datum */}
                            {buyer.type === 'day' && selectedGame && (
                                <div className="mb-4 bg-white/5 p-3 rounded-xl border border-white/10">
                                    <p className="text-xs font-bold text-white uppercase">{selectedGame.label}</p>
                                    <p className="text-[10px] text-[#FF007F] font-black uppercase mt-0.5">{new Date(selectedGame.date).toLocaleDateString('de-DE')} | {selectedGame.time} Uhr</p>
                                    <p className="text-[10px] text-zinc-400 mt-2 pt-2 border-t border-white/10">{buyer.adults} Erw. | {buyer.children} Kind(er)</p>
                                </div>
                            )}

                            <div className="bg-white p-4 rounded-2xl mx-auto w-48 h-48 flex items-center justify-center mb-6 shadow-xl">
                                <img src={`https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${ticketId}`} alt="QR Code" className="w-full h-full" crossOrigin="anonymous" />
                            </div>
                            
                            <p className="font-black text-2xl uppercase italic text-white leading-tight">{buyer.name}</p>
                            <p className="text-zinc-400 font-bold mt-2 text-xs uppercase tracking-widest border-t border-white/10 pt-4 mt-4">
                                {totalPrice} € (Zahlbar an der Kasse)
                            </p>
                        </div>

                        <div className="mt-8 max-w-sm w-full space-y-4">
                            <button onClick={handleDownloadQR} disabled={loading} className="w-full bg-[#FF007F] text-white font-black py-4 rounded-xl uppercase tracking-widest flex items-center justify-center gap-2 shadow-[0_0_20px_rgba(255,0,127,0.4)] active:scale-95 transition-transform">
                                {loading ? 'Generiere Bild...' : '📸 Ticket-Bild speichern'}
                            </button>
                            <p className="text-[10px] text-zinc-500 uppercase text-center mb-4">Ticket wird als Bild auf dem Handy gespeichert.</p>
                            <button onClick={onBack} className="mt-4 text-[#FF007F] font-black uppercase text-xs tracking-widest underline w-full text-center">Zurück zum Start</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-[#050505] p-6 flex flex-col items-center justify-center animate-slide-up text-white overflow-y-auto">
                    <button onClick={onBack} className="absolute top-6 left-6 text-zinc-500 bg-black/50 p-2 rounded-full"><RebelIcon name="arrow-left" size={24}/></button>
                    <div className="w-full max-w-md bg-[#111] p-8 rounded-[3rem] border border-white/5 shadow-2xl mt-12 mb-12">
                        <div className="flex justify-center mb-4"><RebelIcon name="ticket" size={48} className="text-[#FF007F]" /></div>
                        <h1 className="text-2xl font-black italic text-center uppercase mb-6">Fan-Tickets</h1>
                        <form onSubmit={handleBuy} className="space-y-4">
                            <div className="flex gap-2 p-1 bg-black/40 rounded-xl border border-white/5">
                                <button type="button" onClick={() => setBuyer({...buyer, type: 'day'})} className={`flex-1 py-3 rounded-lg text-xs font-black uppercase transition-all ${buyer.type==='day'?'bg-[#FF007F] text-white':'text-zinc-500'}`}>Tageskarte</button>
                                <button type="button" onClick={() => setBuyer({...buyer, type: 'season'})} className={`flex-1 py-3 rounded-lg text-xs font-black uppercase transition-all ${buyer.type==='season'?'bg-white text-black':'text-zinc-500'}`}>Dauerkarte</button>
                            </div>

                            <input type="text" placeholder="Dein Name" required className="w-full bg-black border border-white/10 rounded-xl p-4 text-sm outline-none focus:border-[#FF007F]" value={buyer.name} onChange={e => setBuyer({...buyer, name: e.target.value})} />
                            <input type="email" placeholder="Deine E-Mail" required className="w-full bg-black border border-white/10 rounded-xl p-4 text-sm outline-none focus:border-[#FF007F]" value={buyer.email} onChange={e => setBuyer({...buyer, email: e.target.value})} />

                            {buyer.type === 'day' && (
                                <div className="space-y-4 animate-slide-up pt-2">
                                    
                                    {/* Verbessertes Dropdown Menü für Spiele */}
                                    {upcomingGames.length === 0 ? (
                                        <div className="bg-red-500/10 border border-red-500/30 p-4 rounded-xl text-center">
                                            <p className="text-xs font-bold text-red-500">Aktuell sind keine Spiele geplant.</p>
                                        </div>
                                    ) : (
                                        <select required className="w-full bg-black border border-[#FF007F]/50 rounded-xl p-4 text-sm outline-none text-white appearance-none font-bold shadow-lg" value={buyer.gameId} onChange={e => setBuyer({...buyer, gameId: e.target.value})}>
                                            <option value="" disabled>Welches Spiel möchtest du sehen?</option>
                                            {upcomingGames.map(g => (
                                                <option key={g.id} value={g.id}>{g.label} ({new Date(g.date).toLocaleDateString('de-DE')})</option>
                                            ))}
                                        </select>
                                    )}

                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="bg-black/40 border border-white/10 p-3 rounded-xl">
                                            <label className="text-[10px] text-zinc-500 font-bold uppercase block text-center mb-2">Erw. ({priceAdult}€)</label>
                                            <div className="flex justify-between items-center">
                                                <button type="button" onClick={()=>setBuyer({...buyer, adults: Math.max(1, buyer.adults-1)})} className="text-[#FF007F] font-black text-xl px-2">-</button>
                                                <span className="font-black text-lg">{buyer.adults}</span>
                                                <button type="button" onClick={()=>setBuyer({...buyer, adults: buyer.adults+1})} className="text-[#FF007F] font-black text-xl px-2">+</button>
                                            </div>
                                        </div>
                                        <div className="bg-black/40 border border-white/10 p-3 rounded-xl">
                                            <label className="text-[10px] text-zinc-500 font-bold uppercase block text-center mb-2">Kinder ({priceChild}€)</label>
                                            <div className="flex justify-between items-center">
                                                <button type="button" onClick={()=>setBuyer({...buyer, children: Math.max(0, buyer.children-1)})} className="text-[#FF007F] font-black text-xl px-2">-</button>
                                                <span className="font-black text-lg">{buyer.children}</span>
                                                <button type="button" onClick={()=>setBuyer({...buyer, children: buyer.children+1})} className="text-[#FF007F] font-black text-xl px-2">+</button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            <div className="bg-white/5 border border-white/10 p-4 rounded-xl flex justify-between items-center mt-2">
                                <span className="font-bold text-xs uppercase text-zinc-400">Summe:</span>
                                <span className="font-black text-xl text-[#FF007F]">{totalPrice} €</span>
                            </div>

                            <button type="submit" disabled={loading || (buyer.type === 'day' && upcomingGames.length === 0)} className="w-full bg-[#FF007F] text-white font-black py-4 rounded-xl uppercase tracking-widest shadow-[0_0_20px_rgba(255,0,127,0.4)] disabled:opacity-50 disabled:scale-100">
                                {loading ? 'Generiere...' : 'Ticket sichern'}
                            </button>
                            <p className="text-center text-[10px] text-zinc-500 uppercase mt-2">Zahlung erfolgt vor Ort an der Kasse.</p>
                        </form>
                    </div>
                </div>
            );
        };
        // --- CORE VIEWS ---

        const TicketScannerView = ({ db, theme, tickets, schedule }) => {
            const [scanResult, setScanResult] = useState(null);
            const [scannerActive, setScannerActive] = useState(false);
            const [viewMode, setViewMode] = useState('scanner'); // 'scanner' oder 'list'
            const [filterGame, setFilterGame] = useState('all');
            const scannerRef = useRef(null);

            useEffect(() => {
                return () => { if (scannerRef.current) scannerRef.current.stop().catch(e => console.log(e)); };
            }, []);

            const startScanner = () => {
                setScanResult(null); setScannerActive(true);
                setTimeout(() => {
                    if(!window.Html5Qrcode) return alert("Scanner Modul noch nicht geladen.");
                    const html5QrCode = new window.Html5Qrcode("reader");
                    scannerRef.current = html5QrCode;
                    html5QrCode.start(
                        { facingMode: "environment" },
                        { fps: 10, qrbox: { width: 250, height: 250 } },
                        async (decodedText) => {
                            html5QrCode.stop().then(() => { scannerRef.current = null; setScannerActive(false); verifyTicket(decodedText); }).catch(err => console.log(err));
                        },
                        (errorMessage) => {}
                    ).catch(err => { alert("Kamera Fehler: Bitte erlaube den Kamerazugriff."); setScannerActive(false); });
                }, 100);
            };

            const stopScanner = () => { if (scannerRef.current) { scannerRef.current.stop().then(() => { scannerRef.current = null; setScannerActive(false); }).catch(e => console.log(e)); } };

            const verifyTicket = async (id) => {
                try {
                    const { doc, getDoc, updateDoc } = window.FB;
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'tickets', id);
                    const docSnap = await getDoc(docRef);
                    
                    if(docSnap.exists()) {
                        const data = docSnap.data();
                        const isSeason = data.type === 'season';
                        const ticketDetails = isSeason ? 'Dauerkarte' : `${data.adults || 1} Erw. | ${data.children || 0} Kind(er) - ${data.gameLabel || 'Tageskarte'}`;

                        if (!data.paid) {
                            setScanResult({ status: 'unpaid', id: id, data: data, msg: `Ticket unbezahlt! Bitte ${data.price} € kassieren.`, details: ticketDetails });
                            return;
                        }

                        if (!isSeason) {
                            if (data.used) {
                                setScanResult({ status: 'used', msg: `Achtung! Ticket wurde bereits entwertet. (${data.name})`, details: ticketDetails });
                                return;
                            }
                            await updateDoc(docRef, { used: true, lastScannedAt: Date.now() });
                            setScanResult({ status: 'valid', msg: `Ticket gültig! Viel Spaß, ${data.name}!`, details: ticketDetails });
                            if (window.confetti) window.confetti({ particleCount: 50, colors: ['#00FF00'] });
                            return;
                        }

                        if (isSeason) {
                            const now = Date.now();
                            if (data.lastScannedAt) {
                                const hoursPassed = (now - data.lastScannedAt) / (1000 * 60 * 60);
                                if (hoursPassed < 24) {
                                    const hoursLeft = Math.ceil(24 - hoursPassed);
                                    setScanResult({ status: 'used', msg: `Dauerkarte wurde in den letzten 24h gescannt. (${data.name}) - Sperre: ${hoursLeft}h.` });
                                    return;
                                }
                            }
                            await updateDoc(docRef, { lastScannedAt: now });
                            setScanResult({ status: 'valid', msg: `Dauerkarte gültig! Willkommen zurück, ${data.name}!` });
                            if (window.confetti) window.confetti({ particleCount: 50, colors: ['#00FF00'] });
                            return;
                        }

                    } else { setScanResult({ status: 'invalid', msg: 'Ticket in Datenbank nicht gefunden!' }); }
                } catch(e) { setScanResult({ status: 'invalid', msg: 'Fehler beim Abrufen der Datenbank.' }); }
            };

            const handleMarkAsPaid = async () => {
                if(!scanResult?.id) return;
                const { doc, updateDoc } = window.FB;
                const isSeason = scanResult.data.type === 'season';
                const updateData = { paid: true, lastScannedAt: Date.now() };
                if (!isSeason) updateData.used = true;

                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'tickets', scanResult.id), updateData);
                setScanResult({ status: 'valid', msg: `Bezahlt & ${isSeason ? 'Aktiviert' : 'Entwertet'}! Viel Spaß, ${scanResult.data.name}!`, details: scanResult.details });
                if (window.confetti) window.confetti({ particleCount: 50, colors: ['#00FF00'] });
            };

            const handleDeleteTicket = async (ticketId, ticketName) => {
                if(window.confirm(`Ticket von ${ticketName} wirklich löschen? Das storniert die Reservierung und zieht ggf. Einnahmen sofort aus der Kasse ab.`)) {
                    try {
                        const { doc, deleteDoc } = window.FB;
                        await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'tickets', ticketId));
                    } catch(e) {
                        alert("Fehler beim Löschen des Tickets.");
                    }
                }
            };

            const handleManualCheckIn = async (t) => {
                if(window.confirm(`Gast: ${t.name}\nTicket: ${t.type === 'season' ? 'Dauerkarte' : t.gameLabel}\nBetrag: ${t.price}€\n\nTicket manuell einchecken und Betrag als bar bezahlt verbuchen?`)) {
                    try {
                        const { doc, updateDoc } = window.FB;
                        const isSeason = t.type === 'season';
                        const updateData = { paid: true, lastScannedAt: Date.now() };
                        if (!isSeason) updateData.used = true;

                        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'tickets', t.id), updateData);
                        if (window.confetti) window.confetti({ particleCount: 50, colors: ['#22c55e'] });
                    } catch(e) {
                        alert("Fehler beim manuellen Check-in.");
                    }
                }
            };

            // NEU: Zukünftige Spiele direkt aus dem Kalender laden
            const upcomingGames = useMemo(() => {
                const now = new Date().setHours(0,0,0,0);
                return (schedule || [])
                    .filter(e => e.type === 'game' && new Date(e.date) >= now)
                    .sort((a,b) => new Date(a.date) - new Date(b.date));
            }, [schedule]);

            // Tickets filtern
            const filteredTickets = useMemo(() => {
                if (filterGame === 'all') return tickets || [];
                if (filterGame === 'season') return (tickets || []).filter(t => t.type === 'season');
                return (tickets || []).filter(t => t.gameLabel === filterGame);
            }, [tickets, filterGame]);

            return (
                <div className="space-y-6 animate-slide-up pb-20">
                    <header>
                        <h2 className={`text-2xl rebel-font font-black italic uppercase ${theme==='light'?'text-black':'text-white'}`}>Kasse & Einlass</h2>
                        <p className="text-sm text-zinc-500 uppercase tracking-widest">Tickets verwalten</p>
                    </header>
                    
                    <div className="flex gap-2 p-1 bg-black/40 rounded-2xl border border-white/5">
                        <button onClick={() => setViewMode('scanner')} className={`flex-1 py-3 rounded-xl text-[10px] font-black uppercase transition-all ${viewMode==='scanner'?'bg-[#FF007F] text-white':'text-zinc-500'}`}>QR Scanner</button>
                        <button onClick={() => setViewMode('list')} className={`flex-1 py-3 rounded-xl text-[10px] font-black uppercase transition-all ${viewMode==='list'?'bg-white text-black':'text-zinc-500'}`}>Gästeliste</button>
                    </div>

                    {viewMode === 'list' && (
                        <div className="space-y-4 animate-slide-up">
                            
                            {/* Dropdown basierend auf echtem Spielplan */}
                            <select 
                                value={filterGame} 
                                onChange={e => setFilterGame(e.target.value)}
                                className="w-full bg-black/40 border border-[#FF007F]/30 rounded-xl p-4 text-xs text-white outline-none font-bold uppercase shadow-lg appearance-none"
                            >
                                <option value="all">Alle Tickets anzeigen</option>
                                <option value="season">Nur Dauerkarten</option>
                                <option disabled>──────────</option>
                                {upcomingGames.map(game => (
                                    <option key={game.id} value={game.label}>{game.label} ({new Date(game.date).toLocaleDateString('de-DE')})</option>
                                ))}
                            </select>

                            <div className="grid grid-cols-2 gap-4">
                                <div className="bg-black/40 p-4 rounded-2xl border border-white/5 text-center">
                                    <p className="text-[10px] text-zinc-500 uppercase font-bold tracking-widest">Offen (Res.)</p>
                                    <p className="text-2xl font-black text-yellow-500 mt-1">{filteredTickets.filter(t=>!t.paid).length}</p>
                                </div>
                                <div className="bg-black/40 p-4 rounded-2xl border border-[#FF007F]/20 text-center">
                                    <p className="text-[10px] text-zinc-500 uppercase font-bold tracking-widest">Bezahlt</p>
                                    <p className="text-2xl font-black text-[#FF007F] mt-1">{filteredTickets.filter(t=>t.paid).length}</p>
                                </div>
                            </div>
                            
                            <div className="space-y-2">
                                {filteredTickets.sort((a,b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0)).map(t => (
                                    <div key={t.id} className="bg-[#111] p-4 rounded-2xl flex justify-between items-center border border-white/5 shadow-md">
                                        <div className="flex-1 pr-4 truncate">
                                            <p className="font-bold text-sm text-white uppercase italic truncate">{t.name}</p>
                                            <p className="text-[9px] text-zinc-400 mt-1 truncate">{t.type === 'season' ? '👑 Dauerkarte' : `🎟️ ${t.adults} Erw. / ${t.children} Kind(er) - ${t.gameLabel}`}</p>
                                        </div>
                                        <div className="text-right shrink-0 flex flex-col items-end gap-2">
                                            
                                            {t.paid ? (
                                                <span className="text-[9px] font-black uppercase px-2 py-1 rounded-md bg-[#FF007F]/20 text-[#FF007F]">Bezahlt & Drin</span>
                                            ) : (
                                                <button 
                                                    onClick={() => handleManualCheckIn(t)} 
                                                    className="text-[9px] font-black uppercase px-3 py-1.5 rounded-lg bg-green-500/20 text-green-500 border border-green-500/30 hover:bg-green-500 hover:text-black transition-all active:scale-95 shadow-lg"
                                                >
                                                    Check-In (Bar)
                                                </button>
                                            )}

                                            <div className="flex items-center gap-3">
                                                <p className="text-sm font-black text-white">{t.price} €</p>
                                                <button onClick={() => handleDeleteTicket(t.id, t.name)} className="text-zinc-600 hover:text-red-500 p-1 transition-colors">
                                                    <RebelIcon name="trash-2" size={16} />
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                                {filteredTickets.length === 0 && <p className="text-center text-zinc-500 text-xs italic py-8">Keine Tickets in dieser Ansicht gefunden.</p>}
                            </div>
                        </div>
                    )}

                    {viewMode === 'scanner' && !scannerActive && !scanResult && (
                        <div className="bg-black/40 p-8 rounded-3xl border border-white/5 shadow-xl text-center animate-slide-up">
                            <RebelIcon name="camera" size={64} className="mx-auto mb-4 text-[#FF007F]" />
                            <button onClick={startScanner} className="w-full bg-[#FF007F] text-white py-4 rounded-xl font-black uppercase tracking-widest shadow-[0_0_20px_rgba(255,0,127,0.4)]">Kamera Starten</button>
                        </div>
                    )}

                    {viewMode === 'scanner' && scannerActive && (
                        <div className="bg-black p-4 rounded-3xl border border-[#FF007F] shadow-[0_0_20px_rgba(255,0,127,0.3)] animate-slide-up">
                            <div id="reader" className="w-full rounded-2xl overflow-hidden bg-black"></div>
                            <button onClick={stopScanner} className="w-full mt-4 bg-zinc-800 text-white py-3 rounded-xl font-black uppercase text-xs tracking-widest">Abbrechen</button>
                        </div>
                    )}

                    {viewMode === 'scanner' && scanResult && (
                        <div className={`p-8 rounded-3xl text-center border-2 shadow-2xl animate-slide-up ${scanResult.status === 'valid' ? 'bg-green-500/10 border-green-500 text-green-500' : scanResult.status === 'used' ? 'bg-yellow-500/10 border-yellow-500 text-yellow-500' : scanResult.status === 'unpaid' ? 'bg-orange-500/10 border-orange-500 text-orange-500' : 'bg-red-500/10 border-red-500 text-red-500'}`}>
                            <RebelIcon name={scanResult.status === 'valid' ? 'check-circle' : scanResult.status === 'unpaid' ? 'euro' : 'alert-triangle'} size={64} className="mx-auto mb-4" />
                            <h3 className="font-black text-xl uppercase mb-2">{scanResult.status === 'valid' ? 'Zutritt gewährt' : scanResult.status === 'unpaid' ? 'Kassieren!' : 'Kein Zutritt'}</h3>
                            <p className="text-sm font-bold opacity-80 mb-2">{scanResult.msg}</p>
                            
                            {scanResult.details && <div className="bg-black/30 p-2 rounded-lg text-xs font-black uppercase mb-6 border border-current opacity-80">{scanResult.details}</div>}
                            
                            {scanResult.status === 'unpaid' && (
                                <button onClick={handleMarkAsPaid} className="mb-4 bg-orange-500 text-white py-4 px-8 rounded-xl font-black uppercase tracking-widest w-full shadow-lg active:scale-95 transition-transform">Als Bar Bezahlt markieren & Entwerten</button>
                            )}
                            
                            <button onClick={startScanner} className="bg-white text-black py-4 px-8 rounded-xl font-black uppercase tracking-widest w-full shadow-xl active:scale-95 transition-transform">Nächstes scannen</button>
                        </div>
                    )}
                </div>
            );
        };
        
        const RebelCard = ({ member, goals = 0, mvpWins = 0, isMe }) => {
            const cardRef = useRef(null);
            const [rotate, setRotate] = useState({ x: 0, y: 0 });
            const onMove = (e) => {
                if (!cardRef.current) return;
                const rect = cardRef.current.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                setRotate({ x: (((clientY - rect.top) - rect.height / 2) / (rect.height / 2)) * -10, y: (((clientX - rect.left) - rect.width / 2) / (rect.width / 2)) * 10 });
            };
            const stats = { grip: member.grip || 85, vibe: member.vibe || 99, power: member.power || 88, soul: member.soul || 95 };
            const rating = Math.round((stats.grip + stats.vibe + stats.power + stats.soul) / 4);

            return (
                <div ref={cardRef} onMouseMove={onMove} onMouseLeave={() => setRotate({x:0,y:0})} onTouchMove={onMove} onTouchEnd={() => setRotate({x:0,y:0})} className="relative group w-full max-w-[320px] mx-auto h-[440px] animate-slide-up text-white" style={{ perspective: '1000px' }}>
                    <div className="relative h-full w-full bg-[#050505] rounded-[2.5rem] border border-[#FF007F]/20 overflow-hidden flex flex-col card-shadow transition-transform duration-100 ease-linear will-change-transform" style={{ transform: `rotateX(${rotate.x}deg) rotateY(${rotate.y}deg) scale3d(1.02, 1.02, 1)`, transformStyle: 'preserve-3d' }}>
                         <div className="absolute inset-0 pointer-events-none z-50 opacity-0 group-hover:opacity-100 transition-opacity duration-300" style={{ background: `linear-gradient(${115 + rotate.y * 2}deg, transparent 20%, rgba(255, 255, 255, 0.1) 40%, rgba(255, 255, 255, 0.2) 50%, rgba(255, 255, 255, 0.1) 60%, transparent 80%)` }} />
                         <div className={`absolute -inset-1 bg-gradient-to-r from-[#FF007F] to-purple-600 rounded-[2.5rem] blur opacity-20 transition duration-500 ${isMe ? 'opacity-40' : ''}`} style={{transform: 'translateZ(-50px)'}}></div>
                         <div className="p-5 flex justify-between items-start z-20" style={{transform: 'translateZ(30px)'}}>
                            <div className="flex flex-col items-center"><span className="text-4xl rebel-font font-black italic leading-none">{rating}</span><span className="text-[8px] font-bold text-[#FF007F] uppercase tracking-widest mt-1">SQUAD MEMBER</span></div>
                            <div className="w-10 h-10 border border-[#FF007F]/40 rounded-lg flex items-center justify-center bg-black/40 text-[#FF007F] shadow-[0_0_10px_rgba(255,0,127,0.3)]"><RebelIcon name={member.icon} size={20}/></div>
                         </div>
                         <div className="absolute top-0 left-0 w-full h-64 flex items-center justify-center pointer-events-none overflow-hidden">
                             <div className="text-[#FF007F]/5 text-[180px] rebel-font font-black italic absolute -right-5 -bottom-5 select-none" style={{transform: 'translateZ(10px)'}}>{rating}</div>
                             <RebelIcon name={member.icon} size={120} className="text-[#FF007F] opacity-70 group-hover:scale-110 transition-transform duration-500" style={{transform: 'translateZ(20px)'}} />
                         </div>
                         <div className="mt-auto relative z-20" style={{transform: 'translateZ(30px)'}}>
                            <div className="px-5 pb-2 text-center">
                                <h3 className="text-2xl rebel-font font-black italic uppercase leading-none truncate">{member.name}</h3>
                                <div className="flex items-center justify-center gap-2 my-2"><div className="h-0.5 flex-grow bg-gradient-to-r from-transparent to-[#FF007F] opacity-50"></div><div className="flex flex-wrap items-center justify-center gap-1"><span className="text-[10px] font-black text-[#FF007F] uppercase bg-[#FF007F]/10 px-2 py-0.5 rounded-full border border-[#FF007F]/20 whitespace-nowrap">{goals} Tore 🔥</span>{mvpWins > 0 && <span className="text-[10px] font-black text-yellow-500 uppercase bg-yellow-500/10 px-2 py-0.5 rounded-full border border-yellow-500/20 whitespace-nowrap">{mvpWins}x MVP 🏆</span>}</div><div className="h-0.5 flex-grow bg-gradient-to-l from-transparent to-[#FF007F] opacity-50"></div></div>
                                <p className="text-[9px] text-[#FF007F] font-black uppercase italic mb-1">"{member.motto || 'UNITED WE REBEL'}"</p>
                                <p className="text-[10px] text-zinc-400 font-bold uppercase tracking-widest">#{member.number || '??'}</p>
                            </div>
                            <div className="grid grid-cols-2 gap-x-4 gap-y-3 p-5 bg-black/80 backdrop-blur-md border-t border-[#FF007F]/10 border-b-8 border-[#FF007F]">
                                {['Grip', 'Vibe', 'Power', 'Soul'].map(l => (
                                    <div key={l} className="flex flex-col gap-1">
                                        <div className="flex justify-between text-[7px] font-black uppercase text-zinc-500 tracking-widest"><span>{l}</span><span>{stats[l.toLowerCase()]}%</span></div>
                                        <div className="h-1 w-full bg-white/5 rounded-full overflow-hidden"><div className="h-full bg-[#FF007F] shadow-[0_0_5px_currentColor]" style={{width: `${stats[l.toLowerCase()]}%`}}></div></div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const SquadView = ({ myId, profiles, health, goals, theme, attendance, mvpWins }) => {
            return (
                <div className="space-y-12 pb-20">
                    <header><h2 className={`text-2xl rebel-font font-black italic uppercase ${theme==='light'?'text-black':'text-white'}`}>The Squad</h2><p className="text-sm text-zinc-500 uppercase tracking-widest">Rebel Cards & Stats</p></header>

        // --- NEU: DIENSTPLAN ROULETTE ---

            const upcomingGames = useMemo(() => {
                const now = new Date().setHours(0,0,0,0);

                                    <div className="space-y-2">
                                        {[
                                            { id: 'trikots', label: 'Trikots', icon: 'shirt', color: 'text-blue-400' },
                                            { id: 'getraenke', label: 'Getränke', icon: 'cup-soda', color: 'text-yellow-400' },
                                            { id: 'harz', label: 'Traubenzucker & Tape', icon: 'zap', color: 'text-zinc-300' }
                                        ].map(duty => {
                                            const assignedPlayer = duties[duty.id] ? SQUAD_DATA.find(s => s.id === duties[duty.id]) : null;

                                            const handleVolunteer = () => {
                                                const newDuties = { ...duties, [duty.id]: userId };
                                                onUpdateEvent(event.id, { duties: newDuties });
                                                if (window.confetti) window.confetti({ particleCount: 30, colors: ['#22c55e'] });
                                            };

                                            const handleRoulette = () => {
                                                const attendingIds = Object.entries(eventVotes).filter(([uid, val]) => val === 'Dabei').map(([uid]) => uid);
                                                const alreadyAssigned = Object.values(duties);
                                                let available = attendingIds.filter(id => !alreadyAssigned.includes(id) && id !== 'hc' && id !== 'tm');
                                                if (available.length === 0) available = SQUAD_DATA.map(s=>s.id).filter(id => id !== 'hc' && id !== 'tm'); 
                                                
                                                const randomId = available[Math.floor(Math.random() * available.length)];
                                                const newDuties = { ...duties, [duty.id]: randomId };
                                                onUpdateEvent(event.id, { duties: newDuties });
                                                triggerHype();
                                            };

                                            return (
                                                <div key={duty.id} className="flex items-center justify-between bg-[#111] p-2.5 rounded-xl border border-white/5">
                                                    <div className="flex items-center gap-2">
                                                        <div className={`p-1.5 rounded-lg bg-white/5 ${duty.color}`}><RebelIcon name={duty.icon} size={14} /></div>

                                                    {assignedPlayer ? (
                                                        <div className="flex items-center gap-2">
                                                            <span className={`text-[10px] font-black uppercase px-2 py-1 rounded bg-white/10 ${assignedPlayer.id === userId ? 'text-[#FF007F] border border-[#FF007F]/30' : 'text-white'}`}>
                                                                {assignedPlayer.name}
                                                            </span>

                                                        <div className="flex gap-2">
                                                            <button onClick={handleVolunteer} className="text-[9px] bg-green-500/10 border border-green-500/30 text-green-400 px-3 py-1.5 rounded-lg font-black uppercase hover:bg-green-500 hover:text-black transition-all active:scale-95">Ich mach's!</button>

                                </div>
                            )

                    {pastGames.length > 0 && (

                                            <RebelIcon name="award" className="text-yellow-500" size={24} />
                                        </div>
                                        {!myVote ? (
                                            <div className="space-y-3">
                                                <p className="text-xs font-bold text-zinc-400">Wer war die Rebellin des Spiels?</p>
                                                <div className="grid grid-cols-2 gap-2">{SQUAD_DATA.map(p => (<button key={p.id} onClick={() => onVoteMvp(game.id, p.id)} className="bg-black/50 border border-white/5 text-white p-3 rounded-xl text-xs font-black italic uppercase hover:border-[#FF007F] hover:text-[#FF007F] transition-all truncate text-left">{p.name}</button>))}</div>
                                            </div>

                                            <div className="space-y-3">
                                                <p className="text-[10px] font-black uppercase text-yellow-500 tracking-widest">Aktueller Stand:</p>
                                                {Object.entries(counts).sort((a,b) => b[1] - a[1]).slice(0, 5).map(([pid, c]) => (
                                                    <div key={pid} className="flex flex-col gap-1">
                                                        <div className="flex justify-between text-[10px] font-black uppercase text-white"><span>{SQUAD_DATA.find(s=>s.id===pid)?.name} {myVote === pid && <span className="text-[#FF007F]">(Deine Wahl)</span>}</span><span>{c} {c === 1 ? 'Stimme' : 'Stimmen'}</span></div>
                                                        <div className="h-2 w-full bg-white/5 rounded-full overflow-hidden"><div className="h-full bg-yellow-500 shadow-[0_0_5px_currentColor]" style={{width: `${(c/totalVotes)*100}%`}}></div></div>
                                                    </div>

                    )}

        const FanShopView = ({ theme, products, onAddToCart, cartCount, onOpenCart }) => {

        const TreasuryView = ({ theme, fines, transactions, tickets, isAdmin, onAddTransaction, onDeleteTransaction, onUnpayFine, myId, treasuryGoal, onUpdateGoal }) => {
            const [activeSubTab, setActiveSubTab] = useState('status');
            const [newTrans, setNewTrans] = useState({ label: '', amount: '', type: 'income' });
            const [localGoal, setLocalGoal] = useState({ label: treasuryGoal?.label || '', target: treasuryGoal?.target || 1000 }); 
            
            // BERECHNUNGEN (inkl. Tickets)
            const paidFinesTotal = useMemo(() => fines.filter(f => f.paid).reduce((sum, f) => sum + (f.amount || 0), 0), [fines]);
            const otherIncomeTotal = useMemo(() => transactions.filter(t => t.type === 'income').reduce((sum, t) => sum + (parseFloat(t.amount) || 0), 0), [transactions]);
            const expensesTotal = useMemo(() => transactions.filter(t => t.type === 'expense').reduce((sum, t) => sum + (parseFloat(t.amount) || 0), 0), [transactions]);
            
            // NEU: Ticket-Umsätze berechnen
            const paidTicketsTotal = useMemo(() => (tickets || []).filter(t => t.paid).reduce((sum, t) => sum + (parseFloat(t.price) || 0), 0), [tickets]);
            const openTicketsTotal = useMemo(() => (tickets || []).filter(t => !t.paid).reduce((sum, t) => sum + (parseFloat(t.price) || 0), 0), [tickets]);

            // Kassenstand und Schulden aktualisiert
            const currentBalance = (paidFinesTotal + otherIncomeTotal + paidTicketsTotal) - expensesTotal;
            const openDebtTotal = fines.filter(f => !f.paid).reduce((sum, f) => sum + (f.amount || 0), 0) + openTicketsTotal;

            if(!isAdmin) return null;

            return (
                <div className="space-y-6 animate-slide-up pb-20">
                    <header><h2 className={`text-2xl rebel-font font-black italic uppercase ${theme==='light'?'text-black':'text-white'}`}>Rebel Kasse</h2><p className="text-sm text-zinc-500 uppercase tracking-widest">Admin Finanz-Zentrale</p></header>
                    <div className="grid grid-cols-1 gap-4">

                             <p className="text-6xl font-black italic text-white drop-shadow-[0_0_15px_rgba(255,255,255,0.2)]">{currentBalance.toFixed(2)} €</p>
                             <div className="flex justify-center gap-6 mt-6 border-t border-white/5 pt-6">
                                <div><p className="text-[8px] uppercase text-zinc-500 font-bold">Eingenommen</p><p className="text-sm font-black text-green-500">{(paidFinesTotal + otherIncomeTotal + paidTicketsTotal).toFixed(2)} €</p></div>
                                <div><p className="text-[8px] uppercase text-zinc-500 font-bold">Ausgegeben</p><p className="text-sm font-black text-red-500">{expensesTotal.toFixed(2)} €</p></div>
                                <div><p className="text-[8px] uppercase text-zinc-500 font-bold">Noch offen</p><p className="text-sm font-black text-yellow-500">{openDebtTotal.toFixed(2)} €</p></div>
                             </div>
                        </div>
                    </div>
                    <div className="flex gap-2 p-1 bg-black/40 rounded-2xl border border-white/5">
                        <button onClick={() => setActiveSubTab('status')} className={`flex-1 py-3 rounded-xl text-[10px] font-black uppercase transition-all ${activeSubTab==='status'?'bg-white text-black':'text-zinc-500'}`}>Übersicht</button>
                        <button onClick={() => setActiveSubTab('log')} className={`flex-1 py-3 rounded-xl text-[10px] font-black uppercase transition-all ${activeSubTab==='log'?'bg-white text-black':'text-zinc-500'}`}>Buchungen bearbeiten</button>
                    </div>

                    {activeSubTab === 'status' && (
                        <div className="space-y-6">
                            {/* NEU: Admin Ziel-Einstellung */}

                                <h4 className="text-[10px] font-black uppercase text-[#FF007F] mb-3 tracking-widest flex items-center gap-2"><RebelIcon name="target" size={14}/> Dashboard Ziel ändern</h4>

                                    <div><label className="text-[8px] uppercase font-bold text-zinc-500 block ml-1 mb-1">Ziel-Betrag (€)</label><input type="number" className="w-full bg-black border border-white/10 rounded-xl p-3 text-xs text-white outline-none focus:border-[#FF007F]" value={localGoal.target} onChange={e => setLocalGoal({...localGoal, target: parseFloat(e.target.value)||0})} /></div>

                            </div>

                                    <input type="text" placeholder="Zweck (z.B. Pizza)" className="w-full bg-black border border-white/10 rounded-xl p-3 text-xs text-white outline-none" value={newTrans.label} onChange={e => setNewTrans({...newTrans, label: e.target.value})} />
                                    <input type="number" placeholder="Betrag €" className="w-full bg-black border border-white/10 rounded-xl p-3 text-xs text-white outline-none" value={newTrans.amount} onChange={e => setNewTrans({...newTrans, amount: e.target.value})} />

                            </section>
                            <div className="space-y-3">
                                <h3 className="text-[10px] font-black uppercase text-zinc-500 px-2">Top Schuldner (Rebel Schulden)</h3>
                                {SQUAD_DATA.map(s => {

    }, [upcoming, selectedEventId]);

    if (upcoming.length === 0) return null;

    const activeEvent = upcoming.find(e => e.id === selectedEventId) || upcoming[0];
    const carpools = (allCarpools && activeEvent) ? (allCarpools[activeEvent.id] || {}) : {};

    const saveCarpools = async (newData) => {
        if (!db || !activeEvent) return;
        const { doc, setDoc } = window.FB;
        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'carpools', activeEvent.id), newData);
    };

    const handleOffer = async () => {
        if(!location) return alert("Von wo fährst du los?");

    const handleCancelOffer = async () => {

    const handleJoin = (driverId) => {

        // --- NEU: KABINEN GLÜCKSRAD ---
        const KabinenGluecksrad = ({ theme }) => {
            const options = [
                { label: 'Kuchen backen 🍰', color: '#FF007F' },
                { label: 'Kiste Kaltgetränke 🍻', color: '#8b5cf6' },
                { label: 'Trikots waschen 👕', color: '#3b82f6' },
                { label: '10€ Teamkasse 💸', color: '#ec4899' },
                { label: 'Bälle aufpumpen 🏀', color: '#10b981' },

            ];

            const [rotation, setRotation] = useState(0);
            const [isSpinning, setIsSpinning] = useState(false);
            const [winner, setWinner] = useState(null);

            const sliceAngle = 360 / options.length;

            const spinWheel = () => {
                if (isSpinning) return;
                setIsSpinning(true);
                setWinner(null);

                const winningIndex = Math.floor(Math.random() * options.length);
                const centerAngle = (winningIndex * sliceAngle) + (sliceAngle / 2);
                const targetRotation = 360 - centerAngle;
                
                const currentMod = rotation % 360;
                const extraSpins = 360 * 5; 
                
                let addedRotation = targetRotation - currentMod;
                if (addedRotation < 0) addedRotation += 360; 
                
                const finalRotation = rotation + extraSpins + addedRotation;
                setRotation(finalRotation);

                setTimeout(() => {
                    setIsSpinning(false);
                    setWinner(options[winningIndex].label);
                    if (window.confetti && options[winningIndex].label.includes('Glück')) {
                        window.confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 }, colors: ['#10b981', '#ffffff'] });
                    } else if (window.confetti) {
                        window.confetti({ particleCount: 100, origin: { y: 0.6 }, colors: ['#FF007F', '#ffffff'] });
                    }
                }, 4000);
            };

            const gradientStops = options.map((opt, i) => `${opt.color} ${i * sliceAngle}deg ${(i + 1) * sliceAngle}deg`).join(', ');

            return (
                <div className="glass-card p-6 rounded-3xl border border-[#FF007F]/20 shadow-2xl text-center mb-8 animate-slide-up">

                            style={{ 
                                background: `conic-gradient(${gradientStops})`,
                                transform: `rotate(${rotation}deg)`, 
                                transition: 'transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99)' 
                            }}
                        >
                            {options.map((opt, i) => (
                                <div key={i} className="absolute top-0 left-0 w-full h-full" style={{ transform: `rotate(${i * sliceAngle}deg)` }}>
                                    <div 
                                        className="absolute top-4 left-1/2 -translate-x-1/2 text-[10px] font-black uppercase text-white drop-shadow-md flex flex-col items-center justify-start h-[112px] w-16"

                    </div>

                    {winner && (
                        <div className="animate-slide-up mb-6 bg-black/40 p-4 rounded-2xl border border-[#FF007F]/30">

        // --- NEU: REBEL CAM (Team-Galerie) ---
        const RebelCam = ({ photos, onUpload, onDelete, me, isAdmin }) => {
            const fileInputRef = useRef(null);
            // NEU: State für das aktuell ausgewählte Bild (Vollbild)
            const [selectedPhoto, setSelectedPhoto] = useState(null); 

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 800; 
                        const scaleSize = MAX_WIDTH / img.width;
                        canvas.width = MAX_WIDTH;
                        canvas.height = img.height * scaleSize;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        
                        const base64 = canvas.toDataURL('image/jpeg', 0.7); 
                        onUpload(base64);
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            };

            return (
                <>
                    <div className="glass-card p-6 rounded-3xl border border-[#FF007F]/20 shadow-2xl mb-8 animate-slide-up">
                        <div className="flex justify-between items-center mb-6">
